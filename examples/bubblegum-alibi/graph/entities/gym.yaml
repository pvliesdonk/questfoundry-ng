id: location:gym
name: The Chained Gymnasium
concept: The pastel-draped gym where the lock-in unfolds — doors chained until dawn, disco
  ball overhead, the whole closed circle and its single body.
base:
  appearance: Streamers, a glitter-dusted floor, a stage, and a supply closet that locks from
    inside.
  atmosphere: Sugar-sweet decor curdling into a countdown as the sky outside the high windows
    lightens.
