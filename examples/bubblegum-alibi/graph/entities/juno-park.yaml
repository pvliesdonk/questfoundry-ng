id: character:juno-park
name: Juno Park
concept: Yearbook editor and keeper of everybody's secrets, racing the dawn to unmask a killer
  whose trail leads to the person she loves most.
base:
  appearance: Cardigan pockets stuffed with press-pass lanyards and a dead phone she can't
    stop reaching for; ink-smudged fingers.
  manner: Wry, watchful, cataloguing everyone even as her heart hammers; deflects fear with
    dry jokes.
