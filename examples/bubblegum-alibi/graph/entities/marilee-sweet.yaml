id: character:marilee-sweet
name: Marilee Sweet
concept: The reigning queen bee found strangled with her own victory sash — a girl who traded
  in everyone's secrets and made just enough enemies to fill a locked gym.
base:
  appearance: Pageant-perfect even in death, the winner's sash the color of cotton candy.
  manner: Remembered in flashback as dazzling, cutting, generous and cruel in the same breath.
