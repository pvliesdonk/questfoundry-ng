id: character:mona-vale
name: Mona Vale
concept: Marilee's discarded best friend, demoted from the inner circle that morning, who
  knows exactly how the sash was tied because she tied it in a hundred rehearsals.
base:
  appearance: Immaculate but overdressed, mascara freshly redone in the dark.
  manner: Sweetly wounded, generous with other people's guilt, achingly desperate to belong
    again.
