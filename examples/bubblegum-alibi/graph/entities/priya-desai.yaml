id: character:priya-desai
name: Priya Desai
concept: Class president gunning for the same scholarship, the girl who ran the blackout's
  lighting board and can account for everyone's whereabouts but her own.
base:
  appearance: Clipboard, headset around her neck, blazer with too many pins.
  manner: Brisk, organized, weaponizes competence; deflects suspicion by managing the room.
  gesture: Holds a flat, patient, palm-up hand when she wants something surrendered, the way
    a teacher waits for a passed note.
