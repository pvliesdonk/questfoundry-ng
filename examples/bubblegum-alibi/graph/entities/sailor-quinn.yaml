id: character:sailor-quinn
name: Sailor Quinn
concept: Juno's best friend and quiet crush, the good-hearted dance captain whose scholarship
  rode on tonight — and whose fingerprints keep surfacing near the body.
base:
  appearance: Sequined dance-off costume, one sleeve torn, glitter caught in her hair.
  manner: Warm and steady on the surface, but tonight her hands shake and her answers arrive
    a beat too late.
