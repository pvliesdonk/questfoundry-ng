id: character:tavi-okonkwo
name: Tavi Okonkwo
concept: The lock-in's DJ and Juno's yearbook co-conspirator, who cut the lights for the finale
  and may have cut them for something else.
base:
  appearance: Oversized headphones, glow tape on their sneakers, a laptop bag they won't set
    down.
  manner: Loyal and funny, but flinches whenever the blackout is mentioned.
