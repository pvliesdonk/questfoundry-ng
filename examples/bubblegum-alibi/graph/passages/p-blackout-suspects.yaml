id: passage:p-blackout-suspects
summary: The blackout timeline won't add up — the lights died before Tavi's cue, and Tavi's
  shaking hands confess she killed them early to bury a stunt gone wrong. Between Mona sobbing
  over a fresh demotion, the signature knot only a rehearsed hand could tie, and Sailor pleading
  through tears, Juno holds every buried motive in the room and must decide whether to press
  the grieving girl or protect her.
