id: passage:p-burn-ledger
summary: Juno holds the ledger to the flame in the utility sink and lets every classmate's
  secret curl into ash, her sharpest tool dying with them. Belonging is preserved and the
  curated selves stay intact, but the room's motives are now unprovable — the night's reconstruction
  rests on memory and accusation alone.
