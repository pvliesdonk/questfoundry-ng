id: passage:p-doors-chained
summary: The senior lock-in chains its doors at midnight, and when the blackout finale lights
  come back up Marilee Sweet hangs dead beneath the disco ball, strangled with her own victory
  sash. Alone in the equipment closet, Juno opens the hidden ledger of everyone's secrets
  and finds Sailor's page — the girl she loves — laced with debt, motive, and a trail of evidence
  that all points her way.
