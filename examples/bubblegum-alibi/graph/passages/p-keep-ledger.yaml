id: passage:p-keep-ledger
summary: Juno pockets the lighter and opens the ledger to the room, becoming the exposer she
  swore never to be as affairs, thefts, and betrayals pour into the gym. The full map of motives
  lies spread across the table where the killer's name can be proven beyond bending — leaving
  open whether she names the true killer or shields the girl she loves.
