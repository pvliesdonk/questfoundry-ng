id: passage:p-ledger-tempts
summary: Priya spots the notebook and demands it as evidence while Juno's thumb hovers over
  a lighter, torn between the truth it can prove and the dozens of lives it will detonate.
  Keys rattle at the chained doors — the principal is minutes away, and Juno must decide whose
  name the morning gets.
