id: passage:p-name-truth-burned
summary: With the ledger burned, Juno faces the dawn on her word alone. If she names Sailor,
  the principal leads the girl away on a truth Juno can never prove again — the scholarship
  voided, the crush answered with handcuffs — and the school honors the truth-teller while
  she stands admired and utterly alone.
