id: passage:p-name-truth-kept
summary: With the open ledger confirming every motive line by line, Juno names Sailor and
  the girl is led away on evidence no one can dispute — the scholarship voided, the crush
  answered with handcuffs, her look back heavy with betrayal. The school honors the girl who
  proved the truth but never forgives the exposer she became, and she stands admired and utterly
  alone.
