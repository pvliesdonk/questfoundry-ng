id: passage:p-shield-loved-burned
summary: With the ledger burned, no page can contradict Juno as she builds a false case against
  an innocent classmate to shield Sailor. The innocent is escorted out at dawn while Sailor
  walks free beside her, and Juno carries a second secret heavier than the ashes — a lie no
  surviving page can ever expose.
