id: passage:p-shield-loved-kept
summary: With the ledger intact and its motives laid bare, Juno twists the very evidence that
  proves Sailor guilty to steer blame onto an innocent classmate. The innocent is escorted
  out at dawn while Sailor walks free beside her, and the preserved pages become a standing
  accusation of the lie only Juno knows she told.
