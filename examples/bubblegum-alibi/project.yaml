name: The Bubblegum Alibi
stage: polish
steering:
  dream: 'Play the tonal contrast straight: candy-bright, relentlessly peppy surface; genuine
    Agatha-Christie closed-circle mechanics underneath. Cozy mystery, not gory — the horror
    is social. Every suspect should have a motive rooted in high-school stakes (elections,
    scholarships, secrets, crushes) that feels life-or-death to a teenager.'
