premise: 'Bubblegum Bay High is the peppiest school in three counties — pastel lockers, a
  strictly enforced glitter budget, and the legendary senior lock-in: doors chained at eight
  sharp, opened at dawn, no phones, no parents, all sugar. But when the lights come back after
  the midnight dance-off blackout, reigning queen bee Marilee Sweet is lying under the disco
  ball with her own victory sash knotted around her throat, and the chained doors mean exactly
  one thing — the killer is still in the gym. Juno Park, yearbook editor and keeper of everybody''s
  secrets, has until the doors open to work out which of her candy-coated classmates is a
  murderer, because the evidence the principal will find at dawn points straight at the person
  Juno loves most.'
genre: Mystery
subgenre: Cozy closed-circle whodunit (Agatha-Christie style) in a YA high-school setting
tone: Candy-bright and relentlessly peppy on the surface, dread-tight and quietly desperate
  underneath; glitter over a ticking clock, sardonic warmth curdling into betrayal
themes:
- 'Loyalty against truth: how much will you excuse in someone you love before the evidence
  stops mattering?'
- 'The curated self against the real one: what happens when the secrets you keep for everyone
  become the motive that damns them?'
- 'Belonging against justice: is exposing a friend worth losing the only place you fit?'
- Whether teenage stakes — a scholarship, a crown, a crush — are 'small,' or whether at seventeen
  they are quite literally everything
audience: Young adult (14+) and crossover adult readers who love locked-room mysteries; fans
  of Karen McManus, Holly Jackson, and classic Christie with a bubblegum coat of paint
content_notes:
  include:
  - 'Fair-play mystery mechanics: physical clues, timelines, alibis, contradictions the reader
    can track'
  - Social horror — humiliation, exposure, ostracism, the terror of a leaked secret
  - 'A vividly peppy sensory world: pastel lockers, glitter budgets, sugar highs, dance-off
    spectacle'
  - Every suspect carrying a genuine high-school motive (elections, scholarships, secrets,
    crushes) played with life-or-death sincerity
  - Emotional intimacy and yearning; Juno's conflicted love for the prime suspect
  - Wry, secret-keeper's-eye-view humor that never undercuts the stakes
  avoid:
  - Gore, graphic violence, or lingering on the body — keep the death clinical and off-center
  - Sexual content beyond crushes and chaste tension
  - Adult saviors solving it — the principal and parents stay outside the chained doors until
    dawn
  - Supernatural or fantastical explanations; the killer is human and among them
  - Nihilism or cruelty for its own sake — cozy means the warmth survives the reveal
  - Cheap 'it was all a prank' cop-outs; the murder is real and the resolution earned
pov_hint: First-person, present tense, Juno Park's voice — intimate, observant, ironically
  upbeat masking rising panic; she narrates like she's still composing yearbook captions for
  people she may be about to accuse
scope: medium
