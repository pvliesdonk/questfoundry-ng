pov: first person, intimate and close (Juno Park), narrating as if drafting yearbook captions
  for people she may accuse
tense: present
diction: candy-bright and peppy on the surface, dread-tight underneath; sardonic warmth, glitter-over-clock,
  precise observational wit that keeps curdling into fear
rhythm: Short, bright, quippy sentences that snap; then one long breathless clause that betrays
  the panic underneath.
banned:
- no em-dash-stacked asides used as a verbal tic (limit to sparing use, never two dashes in
  one sentence)
- no adult-crime-procedural jargon (forensics, perp, homicide, DA) that punctures the high-school
  scale
- no dead metaphor idioms ('heart of gold', 'at the end of the day', 'time will tell')
- no ALL-CAPS or exclamation-point spam to fake peppiness; the brightness must come from word
  choice, not punctuation
- no cynical fourth-wall winks that break the sincerity of Juno's dread
- no ornate purple similes about weather, moonlight, or eyes that stall the ticking clock
notes: Juno's cheer is armor over terror; let the loyalty-versus-truth ache bleed through
  every glossy observation, and never let a joke land without a cost.
