id: passage:p-bracken-threshold
summary: At the Ebb bell the Bracken-Channel Wards heave up eel-slick stairs and alley stitches
  as Marin palms her mother’s salt-scored Tidal Mother Map, which inks a hairline night-street
  toward the Ledger vault. Auditors stir as the old name tugs her wrist; barges nose for the
  newborn cut, a sigil-bowl waits at the submerged threshold, and her sounding says the route
  will hold only for tight, quiet steps.
