id: passage:p-secret-walk
summary: She hides the map in oilcloth, gathers a knot of neighbors by lantern, and leads
  them single-file into the vanishing cut on whispered counts, catching near-slips by palm
  and chalk. By cockle dawn, rumors of an unlicensed wayfinder ripple to the Ledger, and watchers
  start reading for her pattern of light.
