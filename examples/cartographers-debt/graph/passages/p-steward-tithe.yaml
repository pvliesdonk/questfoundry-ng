id: passage:p-steward-tithe
summary: Marin wets her thumb and signs the water-ledger in both names; the Tidal Mother Map
  snaps to heel as clerks notch her into the steward rolls and auditors take her shadow. A
  life-tithe sigil blooms cold on her wrist, and before dawn she walks the sealed night-street
  with authority and ache.
