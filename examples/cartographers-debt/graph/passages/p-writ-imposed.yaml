id: passage:p-writ-imposed
summary: She steps into a counting-shack and unfurls the map beneath brine-lamps, drawing
  an emergency countersign and a writ to shutter and reroute the newborn street. Chains and
  lanterns enforce her margins while a clerk threads a red audit fiber through the seam, and
  she feels eyes begin to track her way.
