premise: A canal-city scrivener discovers that the antique map she inherited from her drowned
  mother redraws itself at every low tide — and that each new street it shows exists for exactly
  one night. Following the map could lead her to the debt her mother died refusing to pay;
  ignoring it means the city's night-streets will find someone less careful to walk them.
genre: Fantasy
subgenre: Gothic urban fantasy mystery
tone: nocturnal, briny, close-quarters, knife-edge tense, quietly mournful
themes:
- inheritance versus self-determination
- safety versus responsibility for others
- truth versus comforting myth
- maps’ authority versus lived wayfinding
audience: Older teens and adults who enjoy lyrical, decision-driven urban fantasies and folklore-tinged
  mysteries
content_notes:
  include:
  - tidal magic bound to maps and one-night streets
  - canal-city labor, guild, and bureaucratic pressures
  - grief, legacy, and complicated inheritance
  - cat-and-mouse night journeys with time pressure
  - ethical choices that carry material and social costs
  - whispers or directives from a sentient-seeming map
  - non-graphic peril, chases, and tense confrontations
  - ambiguous debt-spirits and collectors with motives
  - 'cartographic textures: ink, vellum, waterlines, silt'
  - working-class intimacy and found-ally dynamics
  avoid:
  - graphic violence or gore
  - sexual assault or exploitation
  - torture or prolonged cruelty
  - on-page suicide or self-harm
  - cruelty to animals
  - gratuitous body horror or drowning detail
  - hard drug use (beyond incidental alcohol)
  - jokey tonal whiplash or slapstick
  - steampunk gadgetry or high-magic spectacle
  - slurs or demeaning stereotypes
pov_hint: Close first-person present limited to the scrivener; the map intrudes as sparse
  second-person imperatives.
