pov: first person limited (Marin); sparse second-person imperatives from the map
tense: present
diction: spare, salt-worn, literary
rhythm: Short, pressure-tight sentences with occasional long tidal runs; verbs carry weight;
  end beats on image or decision; dialogue clipped, subtext forward.
banned:
- exclamation points
- parenthetical asides ( ) or [ ]
- snark, quips, or pop-culture slang
- anachronistic tech terms (smartphone, app, selfie)
- high-fantasy archaisms (thee, thou, ere)
- ellipses or multiple em dashes to pad tension
notes: Keep the city close, briny, and consequential; let the map issue rare, austere commands
  while Marin’s craft, grief, and duty steer choices with costs.
