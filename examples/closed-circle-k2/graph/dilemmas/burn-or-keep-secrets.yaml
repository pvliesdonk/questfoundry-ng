id: dilemma:burn-or-keep-secrets
question: When Bernard is found dead, do you burn his blackmail materials to protect the living,
  or preserve them as evidence of who had motive to kill him?
why_it_matters: Destroys the secrets that poisoned the house and protects innocent reputations,
  or exposes the killer while ruining lives in the scandal
role: hard
residue_weight: heavy
ending_salience: high
answers:
- id: answer:burn-the-secrets
  text: Feed the documents to the fire and let the dead bury their dead
- id: answer:preserve-the-evidence
  text: Keep the archive intact to ensure justice for Bernard, damn the consequences
