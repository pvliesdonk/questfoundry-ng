id: dilemma:climb-or-wait
question: Do you risk climbing the frozen chandelier to retrieve the key frozen above, or
  wait for the thaw and risk the killer escaping first?
why_it_matters: Determines whether the group takes a dangerous gamble for freedom or maintains
  their civilized patience while trapped with a murderer
role: soft
residue_weight: cosmetic
ending_salience: none
answers:
