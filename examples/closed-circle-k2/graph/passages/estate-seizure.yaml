prose_summary: The cousin directs removal men with sleds through east arch. Seventeen heirs
  disperse; Marion Ashworth stands at west window; Teddy Bryant waits by escritoire in frayed
  coat. Workmen pry mahogany paneling with iron bars, scarring plaster, and lower sections
  onto sleds beyond service entrance. Fireplace holds ash from Bernard's burned alphabetical
  divisions, ending Helena's leverage. She watches the estate's liquidation.
