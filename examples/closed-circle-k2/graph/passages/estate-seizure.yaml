id: passage:estate-seizure
summary: The heirs scatter through the great hall as the cousin's men dismantle the walls
  and lower mahogany paneling toward sleds in the snow. The empty fireplace marks the loss
  of secrets that might have bought time, and the estate's order dissolves into plunder.
