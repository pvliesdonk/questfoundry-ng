prose_summary: Helena Vance displays fraudulent documents upon the escritoire before seventeen
  heirs who recognize their imminent exposure in court with Bernard's indiscretions. Marion
  Ashworth guards a key upstairs while a portfolio in the wall safe holds seventeen months
  of evidence. Teddy Bryant risks imprisonment for fraud. Mantel clock strikes twelve and
  Helena places papers down. Mutual threat binds Helena and Marion.
