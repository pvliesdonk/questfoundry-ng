prose_summary: Marion brushes ash from stained kid leather gloves. Seventeen heirs watch her
  in Great Hall. A chandelier lies fallen on the Persian rug. Fire destroyed Bernard's archive
  and evidence. The butler's hands and house secrets lie buried beneath the frozen garden.
  The household attempts restoration but residue remains. Gloves fray; fingers tremble at
  bell cords. Destruction is irreversible.
