prose_summary: Helena stands beside the escritoire. Marion stands without her pince-nez. Seventeen
  heirs avert their gazes from Marion and from documents upon the marble; all deny the documents'
  contents. The portfolio lies open between them. The ruined chandelier rests on the Persian
  rug. Marion does not ring the bell cord. Isolated silence persists.
