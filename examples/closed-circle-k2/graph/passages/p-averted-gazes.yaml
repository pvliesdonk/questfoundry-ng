id: passage:p-averted-gazes
summary: The assembly fixes attention on the chandelier and the frost-rimed glass, every gaze
  avoiding the center of the room and each other. The imperative of courtesy now enforces
  blindness, and the group fragments into isolated performers.
entities:
- faction:the-snowbound-heirs
