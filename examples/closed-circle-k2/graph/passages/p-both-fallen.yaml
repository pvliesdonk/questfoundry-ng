id: passage:p-both-fallen
summary: Helena's theatrical legacy is publicly savaged and Marion's marriage ends in disgrace.
  Both women are ruined by the exchange of truths and remain isolated in the frozen house
  with shattered reputations.
entities:
- character:helena-vance
- character:marion-ashworth
- location:the-great-hall
irrelevant_flags:
