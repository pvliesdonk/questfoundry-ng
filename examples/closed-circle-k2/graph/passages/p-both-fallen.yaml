- flag:key-frozen
- flag:key-recovered
- flag:mott-intoxicated
- flag:mott-withdrawal
prose_summary: Helena stands beside the escritoire; Marion remains at the settle's edge; seventeen
  heirs stand fixed around perimeter. Marion removed her wedding ring and placed it on escritoire
  beside Pimlico foolscap; heirs observed. Helena's negative review lies exposed; heirs have
  read it. Neither retains leverage. The portfolios remain open. The chandelier lies fallen
  on the Persian rug. Both reputations are ruined.
