id: passage:p-bound-examination
summary: Dr. Mott vomits into the ice sink and convulses until the others tie her to the examination
  table to steady her hands; she begins the autopsy under duress, sacrificing bodily autonomy
  for the continuation of professional ritual. The mood is grotesque, frostbitten necessity.
entities:
- character:dr-elspeth-mott
- location:the-cellars
- character:bernard-croft
