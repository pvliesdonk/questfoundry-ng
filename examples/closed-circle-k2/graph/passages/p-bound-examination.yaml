prose_summary: Dr. Mott, wearing irons and suffering withdrawal tremors at an ice sink, cannot
  steady her hands to operate on Bernard's frozen corpse. She instructs Teddy to bind her
  wrists with silk scarves from her medical bag to the examination table. Teddy moves Bernard's
  body from the settle to the table. Dr. Mott makes the first incision.
