prose_summary: Helena stands with seventeen heirs after Bernard's unsolved murder. Police
  depart with incomplete records. Bernard's portfolio burns in the grate; ash settles in the
  Persian rug's hidden weave. The killer remains unidentified among the heirs. Above, the
  ice block containing the patriarch's testament thaws against the wall.
