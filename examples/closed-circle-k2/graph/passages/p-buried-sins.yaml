id: passage:p-buried-sins
summary: The survivors retain their legal freedom but shoulder unspoken guilt that isolates
  them from one another. The fire destroys Bernard's portfolio in the great hall grate, rendering
  the murder technically unsolved but buried beneath ash while the estate's fate remains trapped
  in the thawing ice block upstairs.
