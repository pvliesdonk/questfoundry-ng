prose_summary: Marion watches snow block the casement to the first floor sills. Telegraph
  wires are dead. No courier has arrived since the constable departed. She turns to face seventeen
  motionless heirs in the chamber. A fallen chandelier lies unmoved on the parquet. She calculates
  provisions against the household ledger and finds the figures irreconcilable. The outside
  world is inaccessible.
