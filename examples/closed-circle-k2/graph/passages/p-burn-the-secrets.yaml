id: passage:p-burn-the-secrets
summary: Teddy reads the thawing will to the assembled heirs as meltwater drips from the frozen
  block onto the estate ledger, legitimizing the fire-iron violence of his claim while the
  records of his true origins burn to ash in the grate; Helena steadies his elbow as he signs
  the drainage orders with a forged signature, fixing his false identity in permanent ink
  while the manor walls crack.
