prose_summary: Teddy reads will to seventeen heirs, who nod. Fire iron fractured ice block;
  Bernard's alphabetical divisions are carbonized ash coating andiron. Meltwater blurs embezzlement
  entries on page eleven of estate ledger. Helena hands Teddy drainage orders and steadies
  elbow with her frayed emerald glove as he forges patriarch's signature, fixing false identity
  while chauffeur records burn. Plaster cracks behind escritoire.
