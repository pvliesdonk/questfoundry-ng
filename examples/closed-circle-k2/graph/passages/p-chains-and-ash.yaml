prose_summary: Teddy stands in irons as a constable secures chains. Helena gathers emerald
  velvet, brushes Bernard's damask-covered form, and exits via the service entrance without
  looking at Teddy. The fireplace contains carbonized proof of seventeen failures and Bernard's
  killers. Men measure walls with metal tapes for demolition and assess removal costs. Justice
  completes hollow.
