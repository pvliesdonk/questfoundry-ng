id: passage:p-chains-and-ash
summary: Teddy stands chained in the great hall while Helena gathers her coat. The fireplace
  contains only grey ash where evidence of Bernard's killers once sat, and industrial demolition
  markers punctuate the snow; the estate falls to erasure and justice arrives hollow.
