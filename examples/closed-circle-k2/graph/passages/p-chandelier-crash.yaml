id: passage:p-chandelier-crash
summary: The chandelier crashes into the Great Hall and shatters, freeing the frozen key.
  Helena retrieves it from the wreckage as the household disperses, and the cellars below
  harbor desperate calculations.
entities:
- location:the-great-hall
- character:helena-vance
- faction:the-snowbound-heirs
- location:the-cellars
prose_summary: The chain snaps. The chandelier falls onto the Persian rug. Ice explodes. Marion
  falls and drops the key. Helena falls and crushes her gloved hand beneath ice. She retrieves
  the wet key and holds it aloft. Seventeen heirs step back. Hours pass. The household disperses
  to corridors and freezing cellars. Bernard remains beneath frayed damask. The chandelier
  lies ruined.
