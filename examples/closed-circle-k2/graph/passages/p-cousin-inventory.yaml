prose_summary: The cousin arrives and orders an inventory to mask his search for leverage.
  He seeks the sealed study files recording debts that threaten his estate claim. He carries
  a match case to burn documents. Seventeen heirs including Marion Ashworth and Teddy Bryant
  witness his arrival. Helena remains seated, planning to use her voice to buy time against
  evidence destruction.
