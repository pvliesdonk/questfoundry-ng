id: passage:p-cousin-inventory
summary: The distant cousin arrives by dogsled and orders an immediate inventory of Helena's
  theatrical collection while his attention fixes on the study door. Helena calculates the
  depreciating value of her performed past against the protective power of the evidence preserved
  upstairs, and the heirs recognize that his contempt conceals desperation to destroy the
  files before they speak.
