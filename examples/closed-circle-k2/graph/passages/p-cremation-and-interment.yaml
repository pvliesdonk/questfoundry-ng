id: passage:p-cremation-and-interment
summary: Helena hurls the portfolio into the great fire, and the guests watch their sins turn
  to smoke with a relief that sickens. Bernard is interred in the frozen earth without epitaph
  or explanation, his knowledge sealed beneath the frost.
