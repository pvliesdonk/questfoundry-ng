prose_summary: Helena Vance burns the portfolio that holds the seventeen heirs' failures,
  debts, assignations, and Marion's Pimlico records. The heirs observe and feel relief followed
  by nausea. Bernard is buried in the frozen garden without epitaph or explanation, his knowledge
  and ivory holder sealed with him beneath the frost.
