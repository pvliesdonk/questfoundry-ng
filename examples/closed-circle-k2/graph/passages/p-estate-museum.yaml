id: passage:p-estate-museum
summary: Helena, Marion, and Dr. Mott suffer total reputational ruin when newspapers publish
  Bernard's meticulous records of their indiscretions. Years pass, and the estate becomes
  a museum of scandal where tourists photograph the blackmail room, converting private shame
  into public spectacle.
