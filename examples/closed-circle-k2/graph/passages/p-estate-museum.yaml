prose_summary: 'Helena reads newspapers exposing seventeen indiscretions: Helena''s debts,
  Marion''s assignations, Mott''s prescription fraud. Bernard lies dead on settle. Dr. Mott
  has been removed in irons. Years pass. National Trust receives estate. Heirs disperse to
  Pimlico, Bath. House becomes museum. Tourists queue. Guide recites secrets. Blackmail room
  is roped with frayed velvet. Display case holds reproduction ledger open to entries.'
