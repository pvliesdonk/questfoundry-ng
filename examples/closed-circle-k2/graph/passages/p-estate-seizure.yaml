prose_summary: Axes breach the study door. The cousin's agent inventories crystal, silver,
  obsolete account books, and a tarnished candelabra on trestle tables, marking them in a
  leather-bound docket for police evidence. Helena calculates the house's depreciating value
  against rising testimony worth. Seventeen heirs stand silent, willing to expose their indiscretions
  to reveal Bernard's greater crime sealed in his tarnished hardware portfolio.
