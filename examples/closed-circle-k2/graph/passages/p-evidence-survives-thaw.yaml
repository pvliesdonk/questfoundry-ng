id: passage:p-evidence-survives-thaw
summary: Helena and Teddy stand in the great hall under guard as the constable preserves the
  portfolio in the safe and the cousin's agents catalog the chandeliers. The estate passes
  from their control and will not survive the thaw, but Bernard's blackmail archive remains
  to testify against his killers.
