prose_summary: Teddy kneels on the rug with hands flat while the constable guards. Helena
  holds cousin's eviction notice with broken seal. The constable locks Bernard's portfolio—the
  alphabetized blackmail archive—into the wall safe between obsolete account books. Thaw frees
  roads by morning to transport the archive to court. Cousin's agents catalogue chandeliers.
  Estate collapses, but archive survives to testify against Bernard's killers.
