prose_summary: Marion Ashworth stands exposed in the drawing room. She filed devastating review,
  circulated foolscap with assignations among seventeen heirs, and removed wedding ring. She
  sets aside kid gloves beside wrecked chandelier on Persian rug. Her hands tremble. Helena
  sits at the escritoire, averting gaze from documents that failed to silence Marion. Heirs
  inventory Marion's assets as her composure fails.
