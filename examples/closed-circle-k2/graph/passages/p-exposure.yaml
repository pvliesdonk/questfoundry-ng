prose_summary: Marion surrenders the safe key to the constable. Officers remove the portfolio
  from the open safe and spread the pages in the investigation room. A sergeant reads evidence
  of embezzlement and prescription fraud to seventeen heirs. Officers arrest two heirs while
  the remaining heirs withdraw their alliance. The pocket watch lies shattered. Helena observes
  and calculates ledger favors chaos.
