id: passage:p-exposure
summary: Police arrive on snowshoes when the storm breaks and confiscate the archive for cataloguing.
  Officers read the files aloud in the investigation room, triggering arrests for embezzlement
  and prescription fraud; the cost is the shattering of the household’s civil pretense and
  the onset of panic.
