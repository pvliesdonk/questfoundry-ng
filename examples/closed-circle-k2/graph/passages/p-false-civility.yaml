prose_summary: Helena Vance pours tea for Marion Ashworth. Marion wears kid leather gloves
  hiding ink stains and a key-shaped welt; Helena displays a tan line on her palm. They exchange
  silent acknowledgment of burned documents and assignation dates. Neither rings for service
  nor stands. The oxidized silver tea service cools. They remain seated in stalemate, unable
  to leave without mutual destruction.
