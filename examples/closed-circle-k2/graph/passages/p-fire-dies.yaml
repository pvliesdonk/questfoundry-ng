prose_summary: Marion Ashworth watches the fire die. Burnt leather and foolscap cool in the
  grate. Water drips from the ceiling. The drawing room freezes; the inkwell ices, fittings
  contract, floor stiffens. Seventeen heirs stand against the walls, breathing vapor. Marion
  stands gloveless, gloves upon the bench, fingers aching, refusing to stoke the fire or seek
  warmth first. No heir moves.
