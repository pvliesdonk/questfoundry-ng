prose_summary: The cousin enters wearing meltwater-darkened gloves and crosses to the escritoire
  in seven paces. Seventeen heirs watch. Marion Ashworth polishes her pince-nez. Teddy Bryant
  stands by the escritoire with severed curtain-cord marks on his wrists. The ruined chandelier
  lies on the Persian rug. Helena does not retrieve her portfolio. She realizes her exemption
  has ended.
