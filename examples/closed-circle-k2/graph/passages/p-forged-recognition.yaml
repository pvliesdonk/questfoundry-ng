prose_summary: Teddy thaws the ice block against the andiron; the patronymic is legible. Seventeen
  heirs witness the will designating Teddy heir but await Marion, who holds the safe key upstairs
  where the birth record that invalidates his claim rests. Helena Vance observes Teddy forging
  the signature while water pools on the Persian rug and the storm seals the roads.
