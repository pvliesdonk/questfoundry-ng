id: passage:p-forged-recognition
summary: Teddy signs the ledger as the snowbound heirs acknowledge his claim, yet Marion holds
  the key to Bernard's safe upstairs and Helena watches the wavering forged signature, aware
  that the birth records within will unmake his inheritance.
