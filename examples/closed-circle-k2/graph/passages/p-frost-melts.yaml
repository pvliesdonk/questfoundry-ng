id: passage:p-frost-melts
summary: The frost on the drawing-room window melts to reveal the gray truth outside and destroys
  the room's protective barrier, confirming that isolation is temporary. The cost is the loss
  of comfortable ignorance and the arrival of unavoidable external reality.
