prose_summary: Helena watches frost melt from the window, revealing the outside world. Meltwater
  breaches sill seal and stains wainscoting permanently. The room’s isolation ends. Unfiltered
  light reveals chandelier wreckage on Persian rug and damp newspapers on escritoire recording
  seventeen indiscretions in permanent ink. Helena turns toward stairs before water breaches
  floorboards. The world outside will judge.
