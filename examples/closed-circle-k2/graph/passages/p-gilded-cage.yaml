prose_summary: Marion Ashworth and Helena Vance sit opposite. The papers incinerated; the
  record of Marion's assignation is ash. Marion rotates her surviving wedding band. The chandelier
  lies wrecked on the floor. They surrender simultaneously, preserving each other with matches
  and mutual cowardice. Frost seals the windows and door. They remain trapped in administrative
  civility.
