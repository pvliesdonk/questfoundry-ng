prose_summary: Teddy smashes concealed gin bottles against the wall, destroying Dr. Mott's
  anesthesia and evidence. Dr. Mott, wearing irons beside Bernard's body on the settle, enters
  withdrawal, trembling. She requests clarity for the examination. Teddy holds an iron poker
  and agrees. She faces him sober, accepting the examination proceeds without anesthesia.
  Her open medical bag and scalpel remain beside the settle.
