prose_summary: Helena retrieves the poker from the fireplace stand, choosing it over the tongs.
  She grips the iron as a weapon. The grate holds carbonized remains of Bernard's alphabetical
  divisions. Her emerald velvet glove frays at the wrist. Seventeen heirs maintain perimeter
  around the settle. She turns toward them, assessing distance to Teddy Bryant near the escritoire.
