prose_summary: Marion Ashworth adjusts her pince-nez and rotates her wedding band, which survived
  incineration of evidence documenting her fourteen-month assignation. Helena Vance stands
  nearby; her palm has a tan line now lacking documentation. Marion dons kid gloves to hide
  ink stains, concealing professional capacity and personal collapse. She steps onto marble,
  preserving an administrative facade while the screen conceals charred foundation.
