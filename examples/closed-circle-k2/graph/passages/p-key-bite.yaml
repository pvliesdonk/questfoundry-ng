prose_summary: Marion stands in the study overlooking the Great Hall and grips the safe key
  from her bodice. The key bites her scarred palm and draws blood onto her skirt. Her pince-nez
  slips. She removed her wedding ring and abandoned administrative neutrality. She knows the
  safe holds a portfolio with her indiscretions between embezzlement and fraud. The constable
  approaches the stairs.
