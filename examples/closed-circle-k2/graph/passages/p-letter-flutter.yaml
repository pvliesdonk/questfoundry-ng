prose_summary: Helena steps near a fallen shattered pocket watch. Marion's trembling hand
  releases a letter; the vellum falls to Persian rug. The heirs shift gazes to the document.
  The dedication reveals an uncatalogued attachment and handwriting matching cellar ledger.
  A gentleman's shadow obscures signature. Marion does not retrieve it and no one destroys
  it. Administrative neutrality cracks. Assembly shares mutual knowledge.
