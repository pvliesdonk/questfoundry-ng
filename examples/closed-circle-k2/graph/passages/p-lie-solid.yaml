id: passage:p-lie-solid
summary: The protagonist recognizes that the deception reflected in the mirror has congealed
  into solid fact through sheer repetition. The performance becomes indistinguishable from
  authenticity, and the cost of this confusion is the immediate necessity of an act that can
  no longer be concealed.
