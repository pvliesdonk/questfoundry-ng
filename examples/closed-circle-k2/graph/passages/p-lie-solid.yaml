prose_summary: Helena completes a signature forgery on a succession document. The false identity
  congeals into administrative fact requiring physical maintenance. She retrieves oxidized
  estate keys from the escritoire and takes a half-full decanter of 1874 embezzled vintage.
  She descends to the cellar to verify records against stored bottles, her silence becoming
  a weight demanding placement.
