prose_summary: Helena tightens a silver mask cutting her cheek; the blood freezes. She deposits
  the pellet into a port glass on the escritoire. Seventeen heirs avoid her gaze, aware succession
  was fixed by forgery and damaged testament. She descends the cellar stairs, suppressing
  smile to prevent deeper laceration. Frozen blood melts on her glove; the first laceration
  marks her as wearer.
