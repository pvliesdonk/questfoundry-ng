prose_summary: Bernard Croft holds the cellar ledger. Seventeen heirs surround him. Teddy
  Bryant accuses Bernard of theft when the patriarch died, citing a glass with lip prints
  between the 1874 and 1876 ports. Marion Ashworth grips certificates. Dr. Mott reaches for
  her bag. Helena Vance shifts her portfolio. Bernard considers burning the ledger but accepts
  exposure. Chandelier key descends.
