prose_summary: Teddy steps away from Bernard's body and asks Helena for until morning to break
  the ice block containing a verification document. Helena provisionally agrees but keeps
  the portfolio documenting Marion's assignations. Marion leaves to search upstairs for leverage.
  The frozen key in the chandelier descends as the ice thaws.
