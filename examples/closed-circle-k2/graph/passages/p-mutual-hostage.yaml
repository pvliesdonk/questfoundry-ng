prose_summary: Marion serves Helena tea in a sealed room and states the arrangement holds.
  They are mutual hostages bound by ashen documents and silent assignations regarding the
  Pimlico solicitor; neither moves without destroying the other. Marion rotates her wedding
  band; Helena observes. Objects include porcelain cup, oxidized silver service, pince-nez,
  kid leather and velvet gloves, ruined chandelier, carbonized review.
