id: passage:p-naked-truth
summary: Marion secures the portfolio in the estate safe and pockets the key, ensuring Bernard's
  blackmail survives to fuel the coming scandal; Helena remains below in the drafty great
  hall, alone with the tools arranged before the ice, while the frozen will upstairs waits
  to determine which heir will inherit the ruins.
