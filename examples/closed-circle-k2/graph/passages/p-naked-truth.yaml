prose_summary: Marion locks the portfolio in the wall safe behind frayed damask, archiving
  Bernard's indiscretions, and stores the key in her bodice against the bow-shaped welt. The
  frozen will waits in ice behind a locked door. Helena stands at the escritoire below, seventeen
  heirs wait at the perimeter, Bernard lies covered on the settle, and chandelier armature
  rests on Persian rug.
