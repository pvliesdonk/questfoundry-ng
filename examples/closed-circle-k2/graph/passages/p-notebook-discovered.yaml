id: passage:p-notebook-discovered
summary: Teddy discovers Marion's notebook concealed among the personal effects and reads
  her handwritten review of Helena's final theatrical performance, which describes Helena
  as a corpse-like parody of her former genius. The discovery exposes the surgical malice
  beneath the household's frostbitten civility, and the cost is Teddy's certainty that these
  ordered manners ever concealed authentic mercy.
