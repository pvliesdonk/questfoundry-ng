prose_summary: Helena Vance and Marion Ashworth burn compromising documents simultaneously.
  Marion holds a review that would end Helena's legacy; Helena holds documentation of Marion's
  assignation with a Pimlico solicitor. Helena strikes match from the mantel tinder box. They
  burn documents in the grate. Mutual complicity binds them in unbreakable pact. They preserve
  each other's secrets at cost of mutual obligation.
