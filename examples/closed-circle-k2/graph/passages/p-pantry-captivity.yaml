id: passage:p-pantry-captivity
summary: The heirs bind Teddy with curtain cords in the pantry, their hands trembling with
  the knowledge that Bernard's portfolio survives upstairs to testify against them all. Teddy
  slumps against the flour bins while someone checks the safe lock again, and their pretense
  of gentility collapses into physical restraint.
