prose_summary: The seventeen heirs seize Teddy, accuse him of fraud, and Helena Vance binds
  his wrists with curtain cords in the pantry. Marion Ashworth descends and tests the wall
  safe lock beside the frozen herring barrels; it holds. Teddy understands the evidence upstairs
  incriminates all seventeen. He cannot see the mantel clock. He calculates the water weight
  accumulating on the ceiling.
