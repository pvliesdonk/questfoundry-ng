prose_summary: Helena retrieves a porcelain cup from the sideboard. The handle breaks off
  in her rigid grip; the cup falls and shatters on the Persian rug, mixing with ash. She places
  the handle on the open ledger. The remaining heirs observe. The silence shifts from civil
  restraint to acknowledged violence. Her composure cracks.
