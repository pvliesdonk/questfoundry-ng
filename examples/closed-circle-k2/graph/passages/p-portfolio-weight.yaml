prose_summary: Marion Ashworth carries Bernard's heavy portfolio from study. She pauses at
  landing to observe seventeen heirs shift around Persian rug since constable left. Helena
  Vance tracks her without eye contact; Teddy Bryant stays by andiron without looking up.
  Marion feels key against her bodice. She reaches marble floor and turns toward oxidized
  silver wall fixture with combination dial. Documents settle.
