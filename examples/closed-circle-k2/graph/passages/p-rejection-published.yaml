prose_summary: Marion reads aloud a negative review of Helena's Imperial Theatre performance
  to seventeen heirs. Documentation of Marion's assignations lies spread among them. Helena
  arrests her hand at her throat. A gentleman's pocket watch shatters; a lady strikes the
  escritoire; heirs cluster in panic. Marion places the review beside the damp portfolio.
  Silence no longer purchases value.
