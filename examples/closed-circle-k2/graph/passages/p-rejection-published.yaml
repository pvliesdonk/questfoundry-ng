id: passage:p-rejection-published
summary: Marion rejects Helena's bargain and reads her scathing review aloud to the assembled
  guests, describing Helena's performance as an embarrassment that should have died unrecorded.
  The cost is the immediate shattering of social order into public mortification, and the
  mood is one of drawing-room manners curdling into panic.
