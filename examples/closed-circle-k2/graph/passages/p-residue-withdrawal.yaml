id: passage:p-residue-withdrawal
summary: Dr. Mott presses trembling fingers to her empty pockets in the drawing room, and
  the clarity of sobriety renders the surrounding civility grotesque while amplifying every
  creak of the manor into the sound of snapping bone.
entities:
- character:dr-elspeth-mott
irrelevant_flags:
- flag:chandelier-destabilized
- flag:key-frozen
- flag:key-recovered
prose_summary: Dr. Mott ascends from the cellar vault to the drawing room with irons on her
  wrists. Her coat pockets lack gin. She enters among heirs. A floorboard creaks; she flinches
  and trembles. Sobriety exposes details and her withdrawal to the assembly. She stands exposed.
