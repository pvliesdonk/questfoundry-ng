prose_summary: Marion Ashworth locks a portfolio in a wall safe, arranging it alphabetically
  by victim for authorities, not extortion. She hides the safe key in her bodice against a
  welt matching the key's bow. She becomes the archive's sole guardian; her body is the vulnerable
  lock, her composure the only shield. The ruined hall has a fallen chandelier and frost-sealed
  windows.
