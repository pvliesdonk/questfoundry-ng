prose_summary: Helena hands Teddy the poker. She lifts the frozen will from the andiron using
  tongs and positions it above the ash. Teddy strikes the ice. The block splits. Water dissolves
  fragments among Bernard's carbonized records. The document exposes a legible patronymic
  validating succession. The heirs witness the validation. Storm blocks roads with snow, trapping
  heirs with evidence of their complicity.
