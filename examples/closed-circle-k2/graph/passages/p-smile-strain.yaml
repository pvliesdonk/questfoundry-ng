prose_summary: Helena Vance turns toward the seventeen heirs and attempts a hostess smile,
  but her facial muscles tremble and the smile fractures. The nearest heir steps backward,
  his heel striking the marble. Another heir drops a tarnished silver card case. The heirs
  exchange glances calculating exits. Helena’s composure cracks visibly, transmitting panic.
  The social arrangement dissolves and the maintained facade shatters.
