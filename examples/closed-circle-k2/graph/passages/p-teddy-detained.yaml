prose_summary: Marion Ashworth binds Teddy's wrists with curtain cords in the pantry. Helena
  Vance reveals the documentation proving Teddy is chauffeur, not heir. Storm buries roads,
  isolating seventeen heirs. Water accumulates on the cellar ceiling. Bernard's blackmail
  archive burns to ash, though barrels of embezzlement evidence remain. Without alphabetical
  foolscap, no heir can prove motive; only Teddy's fraudulent identity is accusation.
