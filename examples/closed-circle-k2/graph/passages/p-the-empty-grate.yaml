id: passage:p-the-empty-grate
summary: Teddy signs drainage orders in the great hall and drinks alone in the cellars while
  the estate's structure crumbles and the thaw undermines the foundations. He achieves the
  title of master but the burned secrets leave no evidence of his true identity, condemning
  him to an unverifiable performance in a decaying house that echoes with his false authority.
