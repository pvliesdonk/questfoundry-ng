prose_summary: Teddy signs drainage orders finalizing estate transfer. The grate holds ash
  from Bernard's archive, eliminating identity proof. He descends to cellar, pours 1874 wine,
  and drops posh accent. He paces great hall past ruined chandelier on Persian rug. House
  accepts him as master but ignores his true name. Distance between performance and empty
  grate remains.
