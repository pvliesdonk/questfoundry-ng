prose_summary: Helena holds the ice block containing the patriarch's will while Teddy strikes
  it with the fire iron. Ice fractures reveal legible text determining succession. Seventeen
  heirs watch. Water damage spreads. Marion Ashworth holds Bernard's portfolio and the archive
  key upstairs in the locked study safe. The investigator arrives with the storm; damage annotates
  guilt. Helena nods; Teddy strikes again.
