id: passage:p-the-iron-bites
summary: Helena steadies the frozen will while Teddy strikes, the iron biting deep until legible
  text emerges; they work knowing Marion has locked Bernard's portfolio upstairs and that
  any scorch or scratch will compound their guilt in the investigation to come. The mood is
  frostbitten dread beneath the performance of civility.
