prose_summary: Teddy forges ledgers but grease blurs signature. Plaster falls from east wall.
  Constable examines Marion's key upstairs while seventeen heirs wait. Teddy drinks port in
  cellar and learns Bernard's files in estate safe prove his borrowed identity and document
  embezzlement and fraud; their preservation exposes seventeen indiscretions. He calculates
  creditor flight. The chandelier lies ruined. National Trust will inherit estate.
