prose_summary: The cousin arrives by dogsled with a folio. Seventeen heirs surround Bernard's
  body on the settle. The cousin inventories Helena's theatrical correspondence and effects
  for liquidation, valuing her emerald gown below repair cost. Bernard's archive is ash. The
  cousin inherits the estate. Helena cannot access her portfolio. He schedules removal before
  the thaw.
