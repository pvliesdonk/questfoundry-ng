id: passage:p-tyrant-arrives
summary: The distant cousin enters the great hall on a dogsled's momentum and orders immediate
  inventory of Helena's theatrical memorabilia for sale. Helena watches the pricing of her
  history, the burned secrets having cleared the way for his uncontested authority.
