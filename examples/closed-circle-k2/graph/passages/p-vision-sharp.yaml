- flag:key-frozen
- flag:key-recovered
prose_summary: Dr. Mott incises Bernard's chest. She finds blood on her cuff predating the
  binding. She sees Teddy pour chloroform. She notes Bernard's shoe indicates rigor set in
  hours ago. She realizes the violence occurred in the east wing and this is a performance.
  She sets down the scalpel and waits for Teddy to notice. She acknowledges her guilt.
