id: passage:p-vision-sharp
summary: 'Her vision sharpens to reveal the inconsistencies: the blood speck on the white
  cuff, the tremor in the poured tea, the corpse’s shoe visible beneath the curtain. She recognizes
  the civility is a performance and the violence is already complete; the clarity costs her
  the protection of ignorance and fixes her to the crime.'
entities:
- character:dr-elspeth-mott
irrelevant_flags:
