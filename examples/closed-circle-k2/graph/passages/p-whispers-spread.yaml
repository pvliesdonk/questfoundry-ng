prose_summary: Helena snaps a fan on escritoire and withdraws glove. Gentleman whispers to
  lady touches brooch. Whispers spread among heirs. Woman adjusts pince-nez addressing aunt
  on rug. Assembly clusters. Marion stands by escritoire. Gentleman questions health; fingers
  twitch to empty ring finger. Marion mentions roads. Room becomes suspicious; gestures interrogate.
