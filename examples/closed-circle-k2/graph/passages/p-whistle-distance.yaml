prose_summary: Marion withdraws from the safe. A police whistle approaches. Seventeen heirs
  lose composure. The cousin chooses flight over burning with sulfur. Helena rests her hand
  on the chair arm. Teddy freezes mid-gesture. Marion holds documents under her corset, which
  become police evidence. The heirs' isolation ends and they face legal scrutiny.
