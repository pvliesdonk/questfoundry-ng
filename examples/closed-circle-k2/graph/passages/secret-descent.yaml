id: passage:secret-descent
summary: Helena discovers documentary evidence in Bernard's archive confirming Marion's affair
  with the estate's married solicitor, knowledge that would destroy Marion's reputation if
  exposed. She descends to the Great Hall where the assembled heirs gather around the suspended
  ice block, now possessing a secret that threatens to unravel the gathering's social order.
entities:
- character:helena-vance
- character:marion-ashworth
- object:bernard-blackmail-archive
- location:the-great-hall
prose_summary: Helena discovers a leather portfolio beneath damask napkins containing Bernard's
  records of Marion Ashworth's fourteen-month affair with a married solicitor. The documentation
  proves Marion's claimed Bath visits were Pimlico assignations. Helena descends to the Great
  Hall where heirs gather around the ice-encased will. She holds the portfolio containing
  evidence that destroys Marion's social standing and waits for acknowledgment.
