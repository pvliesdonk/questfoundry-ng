pov: third person limited, rotating at passage boundaries among Dr. Elspeth Mott, Helena Vance,
  Marion Ashworth, Teddy Bryant
tense: past
diction: Spare, frostbitten, and bureaucratically exact; the vocabulary of ledgers and liquor
  bottles, never of weather or warmth
rhythm: Plain declarative sentences as default; length varies with breath; periodic sentences
  and fragmented breathlessness reserved for the moments when manners crack
imagery: Ice, tarnish, and archival dust; frozen water, oxidized silver, frayed damask, obsolete
  account books; cold lives in objects and postures, never in atmospheric description
dialogue: Brief, unadorned; tags are 'said' or absent; politeness decaying into interruption
  and laconic threat
banned:
- exclamation marks
- rhetorical questions
- second-person address
- sentences opening with a participial phrase
notes: Let the absurdity emerge from the precision; panic is best shown through broken routines
  and physical comedy frozen mid-gesture; never explain the cold, only its effects
interlude: first-person past-tense journal entries (Marion Ashworth)
