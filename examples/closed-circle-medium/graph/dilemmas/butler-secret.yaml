id: dilemma:butler-secret
question: Do you confront the butler about his secret debt to the miner, exposing motive,
  or keep the peace to avoid a panic?
why_it_matters: Confrontation could reveal a financial motive but may incite violence; silence
  preserves calm but leaves a hidden motive unchecked.
role: soft
residue_weight: light
ending_salience: low
answers:
- id: answer:confront-butler
  text: Question the butler directly about the debt.
- id: answer:avoid-confront
  text: Let the secret stay hidden for now.
anchored_to:
- character:butler
- character:miner
