    becomes: fire alarm inoperative, hidden danger present
  - beat: beat:library-commit-evacuate
    becomes: evacuates, rare manuscripts saved, clue lost
  - beat: beat:library-commit-stay
    becomes: stays, retrieves concealed envelope, risking fire spread
  ends:
