  manner: silent
  clock_tick: irregular
  alarm_status: inoperative
  hasFireRisk: 'true'
  fire_extinguished: 'true'
arc:
  begins: small dust‑laden library, wooden shelves, dim lamp, silent atmosphere
  pivots:
