flags:
- id: flag:clue-recovered
  description: The hidden clue is retrieved, providing a breakthrough, while the library suffers
    fire damage.
  source: dilemma
  path: path:stay-for-clue
  derived_from:
  - consequence:clue-recovered
- id: flag:hostess-ruined
  description: The hostess’s reputation is shattered, creating chaos but forcing the killer
    into exposure.
  source: dilemma
  path: path:accuse-hostess
  derived_from:
  - consequence:hostess-ruined
- id: flag:hostess-untouched
  description: The hostess remains respected; suspicion lingers without a public showdown.
  source: dilemma
  path: path:silent-hostess
  derived_from:
  - consequence:hostess-untouched
- id: flag:investigator-detained
  description: The protagonist is arrested, halting personal probing; official channels continue.
  source: dilemma
  path: path:accept-arrest
  derived_from:
  - consequence:investigator-detained
- id: flag:investigator-rogue
  description: Defying the sheriff forces the protagonist to work clandestinely, deepening
    the investigation.
  source: dilemma
  path: path:defy-sheriff
  derived_from:
  - consequence:investigator-rogue
- id: flag:manuscripts-saved
  description: All rare manuscripts are secured; the hidden clue is lost, leaving a gap in
