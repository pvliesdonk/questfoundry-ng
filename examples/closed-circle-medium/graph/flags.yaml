  source: dilemma
  path: path:evacuate-library
  derived_from:
  - consequence:manuscripts-saved
- id: flag:revolver-concealed
  description: The revolver is hidden, protecting the guest but obstructing justice.
  source: dilemma
  path: path:hide-revolver
  derived_from:
  - consequence:revolver-concealed
- id: flag:revolver-in-custody
  description: The old revolver is turned over to the sheriff, enabling formal forensic analysis.
  source: dilemma
  path: path:hand-revolver
  derived_from:
  - consequence:revolver-in-custody
- id: flag:theory-published
  description: The author’s incendiary article shapes public opinion, pressuring the heiress
