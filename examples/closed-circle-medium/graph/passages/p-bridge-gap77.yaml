prose_summary: Jordan Blythe enters stone hallway, approaches oak table with warm walnut‑cased
  revolver (cold iron cylinder). Deputy Hale stands by doorway with badge; partner holds rifle.
  Marta Valen clutches broken‑seal note. Powder curl from earlier shot lingers. Jordan holds
  notebook, then hesitates, able to either give revolver to Hale or hide it in table compartment.
