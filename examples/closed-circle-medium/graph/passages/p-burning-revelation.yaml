prose_summary: Jordan Blythe holds torn page while fire devours lower stacks; guests shout.
  Jordan reads ledger from charred crate, discovers Simon Kade owes a miner, slips ledger
  into coat. The page bears the same name tied to the murder. Marta Valen attempts water rescue
  but pipes freeze. Simon Kade watches. Jordan notes orange hinges warning possible collapse.
  Chandelier shatters.
