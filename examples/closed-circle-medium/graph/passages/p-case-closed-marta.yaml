prose_summary: Jordan stands at hall edge while Sheriff Hale places a ledger on the oak desk,
  writes the final entry that concludes the investigation and seals the lodge records. Deputy
  chuckles and makes a mocking remark. Marta Valen watches the ledger; her reputation is declared
  ruined. Hale stamps the report, lifts the ledger, nods, exits; Jordan watches the seal imprint.
