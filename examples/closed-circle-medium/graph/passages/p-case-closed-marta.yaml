id: passage:p-case-closed-marta
summary: The sheriff files the final report, sealing the investigation with a bland official
  summary while the lodge’s dark humor hangs in the air and Marta’s ruined reputation lingers
  as a sour reminder.
entities:
- faction:local-sheriff
irrelevant_flags:
