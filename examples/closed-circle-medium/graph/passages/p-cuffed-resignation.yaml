prose_summary: Jordan is handcuffed by the sheriff; a deputy states orders are clear and Hale
  arrests him. Hale signs a fresh ledger adding new evidence that overturns the closed‑case
  status. The sheriff’s seal stamps the ledger. Jordan’s notebook remains open. The sheriff
  escorts Jordan to the waiting truck; the untouched revolver marks the stalled investigation,
  costing Jordan his probe.
