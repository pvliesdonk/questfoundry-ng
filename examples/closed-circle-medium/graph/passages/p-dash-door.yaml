prose_summary: Simon Kade covers the furnace intake with a metal sheet and claims the heating
  system is under control, concealing sabotage he discovered. Cole Duvall tries the back service
  door, but Marta Valen has bolted it from inside; his attempt fails and the door slams shut.
  Jordan Blythe declares the heiress ignited the tragedy, prompting guest accusations.
