prose_summary: Jordan steps from the hearth, sees Simon Kade standing rigid, hears the butler
  announce Cole Duvall's hinted debt and the word payment cut off by furnace hiss; cold drafts
  enter through cracked windows, Marta Valen and other guests pull blankets, Simon’s mug trembles,
  the revolver on the table dims, Jordan notes the hidden debt will surface later.
