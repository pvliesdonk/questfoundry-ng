id: passage:p-debt-cold
summary: The hidden debt lingers as an unspoken motive while the conversation about it dissolves
  into a chilling draft; the guests huddle under thin blankets, shivering as an uneasy silence
  tightens the lodge’s claustrophobic atmosphere.
