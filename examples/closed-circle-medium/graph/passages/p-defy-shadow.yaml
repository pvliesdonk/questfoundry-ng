prose_summary: Jordan slips past deputy, evades sheriff’s shout, hides behind column, enters
  western passage. Simon Kade appears, shows hidden seam behind tapestry, reveals narrow door.
  Jordan accepts lead, passes through door into moist stone corridor, clutching notebook and
  badge. He pursues Marta Valen’s alleged false alibi away from sheriff, increasing risk.
