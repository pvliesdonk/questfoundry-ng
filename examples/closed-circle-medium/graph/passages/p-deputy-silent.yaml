prose_summary: Jordan watches Deputy Hale write a note marked quiet in his notebook, then
  file the ledger. Other deputies file paperwork. Jordan’s notebook stays warm from recent
  notes; his pen feels heavier. The lodge remains locked, the storm beats the shutters, guests
  stay wrapped in blankets, and the revolver stays on the table.
