prose_summary: Jordan drives a cart of rare manuscripts down a frost‑slick stone hallway while
  coughing guests follow. Smoke lingers near the doorway. Two uniformed deputies enter; one
  shows a badge and accuses Investigator Blythe of negligence causing the fire. The accusation
  adds reputational cost to Jordan.
