prose_summary: Jordan stands by hearth; Deputy Hale places ledger on stone table and reads
  entry that miner’s body was found beside sealed service door with no malice evidence. Marta
  Valen leans on brass rail, grips steaming mug, alibi holds. Deputies stamp report, slide
  final page onto ledge, announce case closed. Jordan stores warm notebook, case filed, lodge
  tension remains.
