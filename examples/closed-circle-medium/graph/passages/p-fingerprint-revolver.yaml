prose_summary: Marta observes revolver prints matching her own, feels shaken. She walks to
  Highpine Library, opens creaking door, notes dormant brass fire alarm that could spark blaze.
  She scans shelves, uncovers envelope sealed like earlier note, wax warm, containing the
  sought clue. The lamp flickers, alarm’s red eye flashes, then darkness returns.
