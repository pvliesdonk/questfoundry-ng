id: passage:p-frosted-entrance
summary: The investigator arrives at the lodge, noting the tight, nervous tension among the
  remaining guests and staff, then steps inside to feel a sharp, unwelcoming chill as the
  sputtering heating system lets the storm‑driven cold flood the interior.
