prose_summary: Jordan arrives at Highpine Lodge doorway. Inside, Simon stands beside fire,
  Marta near bar, Cole shifts, guests sit on benches. The iron stove sputters, fire dies,
  draft cuts neck, temperature drops sharply. Blizzard intensifies outside, windows thud.
  Guests draw blankets, grip mugs, and the room freezes.
