id: passage:p-frozen-corpse-suspicion
summary: The frozen corpse is discovered, sending murmurs through the lodge and amplifying
  suspicion about who helped the escape. The remaining guests each wonder who might have aided
  the fugitive, heightening tension and mistrust.
entities:
- character:miner
- character:author
- character:butler
- character:hostess
prose_summary: Jordan Blythe enters hallway, records frozen miner’s corpse, pipe wrench in
  scarred hands and half‑buried revolver, in notebook. Simon Kade watches from fire, Marta
  Valen remains silent. Guests whisper about an unseen aid, a tampered furnace, and a possible
  escape route. The speculation raises distrust; Jordan notes that the next question will
  determine whom they trust.
