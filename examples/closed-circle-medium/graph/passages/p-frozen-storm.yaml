prose_summary: Jordan watches fire die, guests blanket up as storm rages. Jordan steps forward,
  declares the murderer identified, points to Simon’s dropped revolver on the central table,
  and declares Marta Valen’s alibi false. Guests fall silent. Jordan leaves the fate of the
  revolver—hand it over or conceal it—to the player.
