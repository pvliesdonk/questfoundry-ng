id: passage:p-frozen-storm
summary: The lodge’s heating collapses, sending the guests scrambling in mismatched coats
  as the cold and smoke fill the hall, while the raging storm outside presses in. In the ensuing
  frozen tableau the investigator exposes Marta’s false alibi and the murder is solved, leaving
  the fate of the revolver undecided.
