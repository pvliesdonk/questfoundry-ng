prose_summary: Deputy Hale interrogates; Jordan Blythe notes missing revolver, feels hidden
  metal against ribs. Jordan slides the revolver into a concealed niche behind the desk’s
  false walnut panel, cylinder against his spine, and declares it stays. Deputy hardens, hand
  on his pistol, offers no command. Murmurs rise, investigation proceeds, Marta Valen remains
  composed; fingerprints link barrel to miner, unnoticed.
