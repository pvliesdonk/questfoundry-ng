id: passage:p-hide-revolver
summary: The investigator slips the old revolver into a concealed niche, keeping the weapon
  out of sight while preserving Marta’s spotless alibi and the hostess’s reputation, leaving
  the forensic link to the miner as a silent undercurrent.
