prose_summary: Jordan hears water from a burst pipe, watches it freeze into a sheet that reveals
  a hidden hinge and rusted lever controlling furnace airflow. Cole Duvall slips on ice while
  trying to open a bolted service door, losing his wrench. Jordan notes the lever can seal
  the lodge in deeper freeze, threatening guests.
