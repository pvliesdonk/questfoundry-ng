prose_summary: Jordan moves deeper into Highpine Library, spots ember on vellum, brushes it
  off, notices leather‑bound treatise, envelope falls with warm wax seal matching earlier
  clue, feels pine sap scent, Simon enters, warns stove instability and hidden flues, Jordan
  pockets envelope, flame remains smoldering but contained, risk of fire persists.
