prose_summary: Deputy Hale initiates lockdown, bolts slam doors. Jordan Blythe moves through
  lodge, keeps hostess name secret, records notes. Jordan retrieves torn library fragment,
  matches its inked line to left‑handed fingerprints on revolver on central table, linking
  weapon to silent guest. Jordan hypothesizes murderer hid revolver, tampered furnace, staged
  fire, and plans to name assailant, risking peace.
