id: passage:p-lockdown-reveal
summary: A lockdown seals the lodge, forcing the investigator to navigate its cramped corridors
  while keeping Marta’s alibi hidden; as the pressure mounts, the gathered clues pinpoint
  the true murderer, and the investigator prepares to name the unseen assailant.
