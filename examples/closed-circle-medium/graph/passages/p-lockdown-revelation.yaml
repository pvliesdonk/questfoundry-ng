prose_summary: Sheriff Hale orders doors sealed and guests stay inside. Jordan Blythe slips
  past a deputy, grabs notebook, examines revolver, broken‑seal note, ash‑stained pipe, Marta's
  fingerprint on the barrel, ledger of miner transactions, and travel receipt whose timestamp
  conflicts with lodge clock. Jordan tears the receipt, concludes the murderer is a guest
  with debts, and readies to announce the identity.
