id: passage:p-lockdown-revelation
summary: The sheriff seals the lodge, and the investigator threads the tightening corridors
  while the gathered clues coalesce around the real murderer; with Marta’s alibi destroyed,
  she prepares to confront the hidden threat among the guests.
