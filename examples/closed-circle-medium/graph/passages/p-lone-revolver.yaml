prose_summary: Jordan conceals his heirloom revolver in his coat as the sheriff orders surrender;
  Deputy Hale steps forward with badge visible while deputies hold rifles, Simon holds a lantern
  and Marta a blanket. Jordan deepens the gun’s concealment, hears a back‑door lock click
  and furnace sigh, and resolves to keep the revolver from the sheriff, remaining defiant.
