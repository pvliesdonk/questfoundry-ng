prose_summary: Marta stands by the brass rail in the stone hallway, whispers to investigator
  Jordan to stay careful and not defy the sheriff because her alibi remains intact. Miners
  gather at the hearth, shout for accountability for the fire and missing clue, drown her
  warning, brandish fists, and break the lodge’s fragile peace.
