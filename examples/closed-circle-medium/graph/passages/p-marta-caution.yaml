id: passage:p-marta-caution
summary: Marta whispers a caution, urging the investigator to stay careful and warning that
  opposing the sheriff could jeopardize every guest while her alibi remains solid, but her
  soft counsel is quickly drowned out by the miners' clamorous demands for accountability.
