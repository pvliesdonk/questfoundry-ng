id: passage:p-marta-support
summary: The investigator, torn between duty and self‑preservation, receives a quiet promise
  of aid from Marta, who warns that accusing her alibi and opposing the sheriff could endanger
  everyone, just as a chorus of miners erupts, demanding swift justice and drowning her encouragement.
