prose_summary: Marta slips a note to the investigator offering the cellar as a workspace,
  warns him that defying the sheriff will seal the lodge and snow will drown escape if his
  charge rises. She notes a warm revolver on the oak table. Miners chant demanding the guilty
  before the furnace, drowning her warning and threatening the truce.
