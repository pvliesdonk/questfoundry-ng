- faction:local-sheriff
prose_summary: Marta Valen warns that rumors leaving the lodge will cause panic; a deputy
  in sheriff’s uniform says they will maintain order but notes guests’ rising fear; guests
  tighten blankets; deputies exchange hushed words about patrol routes and rumor containment;
  the fire in the common room dims, leaving tension in the stone room.
