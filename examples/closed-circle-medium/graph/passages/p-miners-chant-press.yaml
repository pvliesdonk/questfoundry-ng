prose_summary: Miners gather by iron doors, chanting for swift justice for Marta. Jordan Blythe
  writes a terse note urging the investigator to hold firm, folds it, and places it on the
  central table. The investigator stands rigid under pressure; Cole Duvall feels cold tightening
  his scarred hands, expecting the night to last until the stone reveals its secret.
