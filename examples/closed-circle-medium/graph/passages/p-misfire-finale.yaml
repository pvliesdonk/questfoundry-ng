id: passage:p-misfire-finale
summary: The miner’s revolver malfunctions and kills him, and moments later Cole’s own gun
  backfires as he tries to flee, ending his life; the investigator has already turned the
  weapon over to the sheriff, and Marta’s reputation shatters.
