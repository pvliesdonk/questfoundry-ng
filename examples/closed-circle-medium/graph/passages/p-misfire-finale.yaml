prose_summary: Jordan Blythe watches as storm rages; sheriff keeps warm revolver on crate.
  Marta Valen stands near brass tray. Cole Duvall lifts revolver, hammer slips, flash kills
  him; cylinder explodes, he dies and gun clatters. Investigator hands smoking revolver to
  sheriff, who seals it in leather case, orders doors stay sealed and evidence logged. Marta’s
  reputation collapses.
