prose_summary: Storm hammers lodge, fire sputters. Jordan observes silent guests, no town
  protest. Cole Duvall moves to back service door; Simon Kade stops him, claims furnace failing,
  prevents exit. Cole drops wrench, door slams shut. Jordan notes fleeing miner would end
  grievance and debt; notebook grows heavier, suspicion rises.
