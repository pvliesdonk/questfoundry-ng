prose_summary: Jordan writes a folded note with a terse encouragement and gives it to the
  investigator. The investigator reads it, then a deputy arrests him, demanding he surrender
  the inquiry. Jordan watches as the investigator can either submit to the deputy and end
  the probe, or flee into the lodge’s corridors to continue secretly, risking arrest.
