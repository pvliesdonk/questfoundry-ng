id: passage:p-note-stand-firm
summary: Jordan leaves a trembling note urging the investigator to stand firm after Marta’s
  alibi collapses, and the investigator, bolstered by the note, chooses either to submit to
  the sheriff’s arrest or to slip away and continue the investigation in secret.
entities:
- character:author
- faction:local-sheriff
irrelevant_flags:
