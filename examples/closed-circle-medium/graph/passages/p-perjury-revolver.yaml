id: passage:p-perjury-revolver
summary: The deputies warn Marta that lying about the night could be perjury, while the hidden
  gun stays out of sight and her alibi remains unchallenged. The sheriff presses the charge,
  the revolver stays concealed, the investigator keeps Marta’s silence, until the butler discovers
  the weapon and quietly displays it, yet the investigator continues to shield Marta’s testimony.
