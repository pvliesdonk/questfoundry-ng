prose_summary: Jordan commands Cole; Cole opens back door and leaves into blizzard, door slams
  shut. Storm intensifies, fire weakens. Marta rises and declares she was alone in the library
  when the body was found. Jordan records Marta’s guarded demeanor. Investigator’s notebook
  shows blank page next to half‑filled revolver entry.
