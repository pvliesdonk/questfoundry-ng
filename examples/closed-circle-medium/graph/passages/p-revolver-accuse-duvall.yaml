prose_summary: Cole lifts the old revolver, announces forensic report showing miner’s fingerprints
  on the barrel; the sheriff seizes the gun and places it in a deputy’s case. A deputy handcuffs
  Cole and forces him toward the exit; Cole shouts he is framed. The crowd reacts with fear
  and anger as tension rises; the revolver becomes official evidence.
