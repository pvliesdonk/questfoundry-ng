id: passage:p-revolver-accuse-duvall
summary: The investigator presents forensic proof that the revolver bears Cole Duvall’s fingerprints,
  and the sheriff places Duvall in custody while the crowd, already inflamed by the earlier
  accusation against Marta, erupts in suspicion.
