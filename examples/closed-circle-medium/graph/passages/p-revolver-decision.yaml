id: passage:p-revolver-decision
summary: The investigator weighs the sheriff’s deputies’ demand for the revolver as a chance
  to expose Marta’s false alibi and assert authority, but hesitates, fearing an innocent guest
  might be implicated; the urge to publicly ruin Marta’s credibility ultimately outweighs
  the concern.
