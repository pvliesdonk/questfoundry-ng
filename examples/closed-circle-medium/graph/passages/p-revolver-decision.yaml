prose_summary: Deputy Hale orders Jordan to place the revolver under sheriff control. Jordan
  evaluates using the warm revolver to expose Marta Valen’s false alibi versus risking an
  innocent guest. He decides the exposure matters more, hands the revolver to Hale, confirming
  the evidence and granting sheriff jurisdiction.
