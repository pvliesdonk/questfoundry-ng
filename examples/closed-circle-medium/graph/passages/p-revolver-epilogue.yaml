prose_summary: Jordan hides a revolver in the desk niche, decides not to reveal it while Marta
  Valen maintains her alibi, and slides the gun back. A stray spark ignites the revolver,
  it fires, and Jordan is shot in the chest; the notebook falls and blurs the alibi note.
  Marta’s reputation stays intact, the revolver remains concealed, and the investigation stalls.
