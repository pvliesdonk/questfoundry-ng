prose_summary: Jordan stands under vaulted ceiling; revolver sits on central table. Accusation
  that Marta Valen fabricated alibi divides guests. Concealed cylinder fires, killing stunned
  miner. Gun slips from Simon, hammer strikes table, a shot wounds Jordan’s side. Marta presents
  brass tray with anonymous note, claims she was alone. Deputy tries to seize revolver; deputies
  return it to hidden niche behind desk.
