prose_summary: Jordan hands revolver in walnut case to Deputy Hale, says it stays there, and
  keeps Marta’s claim of being alone in library secret. Deputies move gun to sheriff’s office;
  forensic team matches prints to miner Cole Duvall. Cole protests, is handcuffed. Revolver
  sits on sheriff’s desk; Jordan carries notebook. Hostess’s reputation remains intact.
