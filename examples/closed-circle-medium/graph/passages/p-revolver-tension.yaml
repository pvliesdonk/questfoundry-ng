prose_summary: Marta watches a warm revolver on the table. The investigator stands by the
  fire and announces accusations that threaten her honor. Two deputies enter, one badges the
  light and declares her overreach ends, the other grips the revolver case. Their gaze shifts
  from the investigator to Marta, leaving her reputation hanging between legal authority and
  frightened guests.
