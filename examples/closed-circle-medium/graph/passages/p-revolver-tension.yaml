id: passage:p-revolver-tension
summary: Marta frets that the revolver’s appearance will ignite the lodge’s simmering tension,
  unaware the investigator is about to publicly undermine her. Sheriff deputies then confront
  the investigator, accusing him of overreach and putting Marta’s reputation on the line.
