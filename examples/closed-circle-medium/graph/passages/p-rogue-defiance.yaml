prose_summary: Jordan Blythe smells lingering gunpowder in the lodge, deputy Hale accuses
  him of negligence for a fire and lost evidence. Jordan confronts Hale, declares he will
  not be silenced. The old revolver lies warm on the table. The blizzard beats the windows,
  the furnace sputters; Jordan realizes defying the sheriff forces him to work clandestinely.
