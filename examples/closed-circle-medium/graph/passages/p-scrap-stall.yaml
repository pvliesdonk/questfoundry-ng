id: passage:p-scrap-stall
summary: The investigator uncovers a scrap of paper tying the old revolver to an unknown hand,
  preserving Marta’s innocence, and as night deepens the case stalls, leaving the murderer
  free and Marta’s reputation untouched while the investigator still faces the choice of what
  to do with the revolver.
