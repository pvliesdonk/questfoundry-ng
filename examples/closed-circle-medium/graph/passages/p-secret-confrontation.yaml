id: passage:p-secret-confrontation
summary: Simon leans in and whispers about a hidden passage that could let someone move through
  the library unseen, then melts into the shadows. Shortly after, Cole confronts Marta, accusing
  her of exploiting the miners.
entities:
- character:butler
- character:miner
prose_summary: Simon tells about a narrow hidden way behind the oak shelves, then disappears
  into shadows. Cole enters, carrying a pipe wrench, and accuses Marta of skimming miners'
  share; Marta grips her steaming mug and stays silent. Simon watches from darkness, noting
  tension; the secret doorway behind the shelves remains unused.
