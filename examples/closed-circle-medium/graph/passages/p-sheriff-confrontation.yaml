prose_summary: Jordan enters main room; deputies line doorway with rifles and badges. Lead
  deputy declares Jordan overstepped jurisdiction and orders arrest. Second deputy points
  at revolver on oak table then lowers it. Crowd shifts. Jordan grips notebook, weighs option
  to surrender notebook and inquiry versus hide notebook and continue investigation. Jordan
  chooses to refuse arrest and demand answer; deputies tighten rifles.
