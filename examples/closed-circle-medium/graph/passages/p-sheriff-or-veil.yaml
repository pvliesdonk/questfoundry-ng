id: passage:p-sheriff-or-veil
summary: Jordan's trembling note urges the investigator to hold steady while Marta's story
  remains unheard, and the investigator must decide whether to surrender to the sheriff or
  continue covertly.
entities:
- character:author
- faction:local-sheriff
irrelevant_flags:
- flag:clue-recovered
prose_summary: Jordan writes a trembling note in a notebook saying “hold steady.” Sheriff’s
  men enter; Deputy Hale places his hand on a revolver and orders Jordan to come with them.
  Jordan reads the note, weighs surrender (ends covert search) versus continuing covertly
  (increases danger). Jordan steps toward Hale, decision pending.
