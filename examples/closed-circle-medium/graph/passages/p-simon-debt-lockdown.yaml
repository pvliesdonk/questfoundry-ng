prose_summary: Simon carries a ledger showing his debt to a miner linked to the heiress murder.
  Deputy Hale orders all exits sealed, bars doors, locks service tunnel, and keeps guests
  in the main hall. The sheriff repeats the lockdown. Simon hides the ledger under his vest
  while the fire burns low. Sheriff’s lantern provides light.
