prose_summary: Sheriff orders lockdown, seals doors; deputies guard, clerk shuts entrance.
  Investigator evades deputy, clutching notebook accusing Marta Valen, and slips into hidden
  stone corridor behind tapestry revealed by Simon. Simon watches, notes that ordinary routes
  are blocked but secret passage remains, decides to use it to transport Marta’s alibi evidence
  away from sheriff, and steps aside as hallway becomes conduit.
