prose_summary: Simon Kade stands by the iron hearth, draws his revolver, and pulls the trigger,
  shooting himself. The revolver clatters to the hearth, the fire sputters and dies, the room
  cools rapidly, darkness falls, murmurs arise but no guest approaches, and silence settles,
  confirming his secret and debt are now known.
