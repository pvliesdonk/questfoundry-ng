pov: third-person limited, rotating among Jordan Blythe, Simon Kade, Marta Valen, Cole Duvall
tense: past
diction: spare, ash‑gray, investigative
rhythm: most sentences are plain and complete, varied in length; occasional longer sentences
  carry a measured, almost metered cadence for heightened moments
imagery: cold stone, pine sap, iron hinges, lingering smoke, echoing footfalls; dread lives
  in shadows and creaks, never in overt metaphor
dialogue: brief, unornamented; tags are 'said' or omitted
banned:
- exclamation marks
- second‑person address (you, your)
- sentences opening with a participial phrase
- dialogue tags other than 'said'
notes: 'Apply the voice sparingly: let the plain narrative carry the plot and reserve the
  ash‑gray diction, cadence, and palette for the handful of beats that need atmosphere.'
interlude: first-person past-tense journal entries (Jordan Blythe)
