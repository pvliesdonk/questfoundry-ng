prompt: A bleak, snow‑covered crossroads in front of an isolated manor, rendered in tight,
  noir‑inspired line work with heavy black shadows and muted earth tones of gray, brown, and
  slate. A single lantern hangs from a rusted lamppost, casting a deep crimson pool of light
  that illuminates the silhouettes of five cloaked figures—two trench‑coated men, a woman
  in a vintage dress, and two shadowy shapes—who stand in a tense circle, their faces hidden.
  On the frosted ground near the lantern, a cracked gold pocket watch lies half‑buried, its
  ticking implied. The composition is balanced with ample empty space at the top and bottom
  of the frame for title placement, and occasional splashes of muted colour emphasize the
  mysterious atmosphere, evoking the style of Frank Miller, Edward Gorey, and classic crime
  comics.
