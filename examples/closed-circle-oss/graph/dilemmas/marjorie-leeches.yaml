id: dilemma:marjorie-leeches
question: Should Marjorie publicly confront Clifford about suspected smuggling or gather proof
  silently?
why_it_matters: A public accusation could scare off the smuggler or provoke violence; a silent
  approach preserves safety but risks losing evidence.
role: soft
residue_weight: light
ending_salience: low
answers:
