question: Should Thea allocate the limited life‑saving serum to the mayor's son (a political
  asset) or to a random injured stranger?
why_it_matters: Giving it to the mayor secures political favor but abandons a victim; sharing
  it equitably saves a life but may cost Thea future protection.
