id: object:ornate-knife
name: Ornate Knife
concept: a heavy ivory‑handled hunting knife, missing its sheath
base:
  polish: bright
  location: stone slab
  sheath_missing: 'true'
arc:
  begins: The Ornate Knife is a heavy ivory‑handled hunting knife, missing its sheath.
  pivots:
  - beat: beat:knife-disposal-lead-1
    becomes: Knife is meticulously polished, its ivory handle gleaming.
  - beat: beat:knife-disposal-lead-4
