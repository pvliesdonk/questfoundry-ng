prose_summary: Harriet presses her shoulder to the stone bridge railing, watches the foggy
  canal as the Farmer Union march approaches. She feels her council badge weight, notices
  a torch flame catching the rail, feels wind lift leaves, tightens her revolver strap, and
  remains vigilant, ready to act if the protest escalates.
