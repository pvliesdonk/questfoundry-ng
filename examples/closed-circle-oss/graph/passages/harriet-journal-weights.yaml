prose_summary: Harriet Wellman writes a journal entry recording the cost of arrests she ordered,
  noting limp farmer‑union banners, narrowed market alleys, and thick night darkness. She
  records that the quiet enforced by cuffed protesters costs the community more than fines
  and widens the gap between her badge and villagers. She views the ivory‑handled knife and
  Edgar’s folded note, feeling burdened.
