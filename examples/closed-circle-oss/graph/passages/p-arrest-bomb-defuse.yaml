id: passage:p-arrest-bomb-defuse
summary: Harriet handcuffs Edgar before the diner’s crowd, their jeers fracturing the fragile
  order, while Lucy wrestles the ticking bomb with a wrench, sustaining a cut as she disables
  it, and a terse warning note leaves Harriet uneasy.
