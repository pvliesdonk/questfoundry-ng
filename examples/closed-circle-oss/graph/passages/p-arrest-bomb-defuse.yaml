prose_summary: Harriet arrests Edgar with iron handcuffs; Lucy uses a steel wrench to cut
  open and defuse a humming bomb, sustaining a forearm wound. Thea slips a warning note to
  Harriet about danger beyond the arrest. Edgar notes an ivory-handled knife on his desk and
  a loose floorboard concealing something. A distant gunshot rings.
