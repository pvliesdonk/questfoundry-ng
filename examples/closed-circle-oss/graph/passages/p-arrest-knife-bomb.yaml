id: passage:p-arrest-knife-bomb
summary: Harriet arrests Edgar, his scar bleeding as a gleaming ornamental knife is uncovered
  in his desk, confirming suspicion. Lucy defuses the sputtering bomb while Harriet notes
  a distant gunshot in her journal.
