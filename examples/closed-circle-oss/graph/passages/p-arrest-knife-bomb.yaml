prose_summary: Harriet moves through diner, pockets Thea’s warning note, arrests Edgar with
  badge and iron handcuffs, reopening his scar wound. She lifts desk slab, exposing ivory‑handled
  knife and torn Blackwood Ledger page. Lucy disables bomb by wrenching and snapping its red
  wire. Harriet records gunshot, hides ledger page under coffee foam; Edgar sees smoldering
  Old Mill tower and hears gears.
