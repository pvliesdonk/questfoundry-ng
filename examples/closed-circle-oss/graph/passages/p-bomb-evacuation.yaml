prose_summary: Lucy Frost observes a ticking bomb in the diner back room as the crowd exits.
  Clifford Moon leaves the scene unchanged. Harriet Wellman contacts the bomb squad with her
  radio, gloved hand on the device, badge visible. An ivory-handled knife lies at the doorway
  without its sheath. Lucy must either assist Harriet with the radio or take the knife.
