id: passage:p-bombed-hall
summary: A faint ticking and the metallic scent of gunpowder fill the community hall, sparking
  panic as Lucy’s alarmed stare meets Marjorie’s hopeful smile; Marjorie urges the doors to
  stay open, arguing the evening crowd’s morale depends on it.
entities:
- character:lucy-frost
- character:marjorie-lynch
prose_summary: Edgar hears ticking and gunpowder scent, crowd panics. Lucy Frost looks at
  bar, scar visible. Marjorie Lynch smiles, locks gaze with Lucy, then urges doors stay open
  for rally morale. Harriet Wellman guards oak doors, badge flashing, hand on latch. Edgar
  feels revolver at hip as ticking rises.
