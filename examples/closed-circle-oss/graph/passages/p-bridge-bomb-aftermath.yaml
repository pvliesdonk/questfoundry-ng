id: passage:p-bridge-bomb-aftermath
summary: Harriet steadily calls the bomb squad as Marjorie watches the empty doorway, then
  Lucy guides terrified patrons out of the diner, leaving an echoing silence while Harriet
  records the night’s dread in her journal and cross‑checks Edgar’s alibi against testimonies,
  with Marjorie lingering on the pages.
