prose_summary: Mayor Caldwell watches Deputy Sheriff Harriet Wellman cuff farmers; a farmer
  vows retaliation. Caldwell thanks Harriet, clasps her forearm, then retrieves the Blackwood
  Ledger from the brass‑bound safe and hides it in a false‑panel compartment, sealing the
  safe. He notes farmer‑union revenge threat and image damage; a leather‑bound journal lies
  open for writing.
