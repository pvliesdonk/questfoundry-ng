prose_summary: Lucy disables bomb by snapping red wire; Clifford Moon flees, blood‑soaked
  coat. Lucy seizes coat, drags him toward kitchen‑stairs arch, leaving scarlet trail. Harriet
  Wellman watches, records events in leather‑bound journal and pockets it. Lucy’s copper‑tinged
  wound pulses; she steadies herself for what lies beyond.
