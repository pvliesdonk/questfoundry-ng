prose_summary: Clifford watches interrogation doors slam; guard lifts his arm and escorts
  him out. He notes a missing ivory-handled knife and an empty sheath, a suspect being questioned,
  and Sergeant’s notebook. Marjorie Lynch serves coffee, glances, and nods as Clifford hides
  a tightly-wrapped package in his coat pocket. He sees the iron hatch to the Old Mill tunnels,
  preparing to descend.
