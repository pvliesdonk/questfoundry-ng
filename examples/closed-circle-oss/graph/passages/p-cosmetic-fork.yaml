prose_summary: Harriet opens the mill hatch, discovers the Blackwood Ledger hidden in a cavity,
  and notes an ornate knife lodged in a beam. She takes the ledger, keeps the lantern lit,
  and hears the farmer union chant. The ledger now adds weight to her inventory; the knife
  remains in place.
