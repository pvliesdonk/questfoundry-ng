id: passage:p-diner-bomb-altar
summary: Thea rushes into the cellar, stops at the doorway as the ornate knife catches the
  dim light, and finds it placed on an altar, its blade still stained with fresh blood.
entities:
- character:thea-swan
- object:ornate-knife
- location:old-mill
prose_summary: Edgar Barnes and Thea Swan enter the diner cellar via the rusted iron door;
  Thea sees an ivory‑handled knife with fresh blood on a stone altar. Lucy Frost reveals the
  knife vanished from the evidence locker. Dripping water, a disappearing droplet, dust footprints,
  and an open ledger hint at a hidden source and older secret. Tension and danger rise.
