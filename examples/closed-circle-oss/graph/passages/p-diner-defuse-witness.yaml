id: passage:p-diner-defuse-witness
summary: Harriet confronts Edgar’s dubious alibi amid growing gossip that he’s framed, while
  Lucy, wrench in hand, methodically disables the bomb as sparks fly, tightening the diner’s
  fraught atmosphere.
