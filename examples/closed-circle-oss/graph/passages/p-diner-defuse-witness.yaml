prose_summary: Lucy uses a wrench to open a bomb, removes a blue wire with a screwdriver,
  then presses the final wire, defusing it; Harriet arrives with a badge and a torn Blackwood
  Ledger fragment, demanding truth about Edgar Barnes, who recites a rhyme; Mayor Caldwell
  urges arrest; Lucy’s palm scars, the knife and ledger remain visible, town hushes, Lucy
  leaves shaken.
