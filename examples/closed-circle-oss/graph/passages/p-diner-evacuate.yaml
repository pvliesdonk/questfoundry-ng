prose_summary: Lucy pulls alarm lever, raises voice, and guides patrons out the swinging door
  onto rainy street; crowd exits, she points toward dim lane. Clifford Moon slips into kitchen
  alley, disappears. An ornate ivory-handled knife lies in wet stone. Edgar Barnes mutters
  a clock rhyme. Thea Swan carries a serum vial. Lucy stands between fleeing crowd and unseen
  pulse, alarm continues.
