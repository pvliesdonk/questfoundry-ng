id: passage:p-diner-evacuate
summary: Lucy blasts the alarm and herding the diners, escorts every trembling patron onto
  the street where they flee unharmed, while Clifford melts into the night’s darkness as Lucy
  maintains order amid the looming chaos.
entities:
- character:lucy-frost
- character:marjorie-lynch
- character:clifford-moon
