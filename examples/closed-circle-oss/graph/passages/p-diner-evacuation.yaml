prose_summary: Harriet leaves diner, takes ledger fragment, finds hidden debt page in garden
  under bench, lights lantern. Lucy sounds alarm, bomb timer ticks faster. Mayor Caldwell
  arrives, orders Harriet to detain Edgar. Harriet handcuffs Edgar but leaves cuff slack;
  Edgar moves toward garden as crowd surges and bomb nears explosion.
