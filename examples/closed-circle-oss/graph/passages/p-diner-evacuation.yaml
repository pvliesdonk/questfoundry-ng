id: passage:p-diner-evacuation
summary: Harriet uncovers a ledger fragment tying Edgar to a hidden debt as Mayor Caldwell
  urges her to lock him up, and Lucy triggers the alarm while the bomb timer ticks louder,
  forcing everyone to evacuate the diner under growing moral and lethal pressure.
