prose_summary: Edgar, still cuffed, watches Harriet badge‑order the diner under a brass lantern
  while Lucy, copper‑stained and blood‑smeared, trembles near the bomb. Marjorie works the
  espresso machine. A distant gunshot echoes. Edgar slips a folded ledger page from his pocket
  and places it beneath Marjorie's coffee foam as she pours, hiding the secret in the townsfolk’s
  drink.
