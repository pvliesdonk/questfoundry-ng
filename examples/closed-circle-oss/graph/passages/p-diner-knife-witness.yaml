prose_summary: Lucy Frost stands behind the bar holding a warm steel wrench after a bomb blast;
  an ivory-handled knife lies on a stone slab with fresh blood on its handle. Harriet Wellman,
  badge glinting, watches without a weapon. Lucy tends her forearm wound, notes the missing
  sheath, an ajar metal latch, and a dark passage beyond the slab.
