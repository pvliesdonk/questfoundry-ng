prose_summary: Lucy pulls the latch under the cracked oak, opening a hidden floor gap. She
  steps onto the iron‑rimmed edge and enters a narrow stone tunnel. Harriet remains at the
  diner holding a lantern; a blood‑stained ivory knife lies where Lucy placed it. Lucy descends,
  hearing distant gear turning, indicating deeper unseen exits.
