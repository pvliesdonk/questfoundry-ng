prose_summary: Edgar presses his badge, follows a drip, finds a fissure, opens a rusted iron
  latch, lowers his lantern, enters a tunnel that descends then curves upward to a stairwell,
  climbs into a dim corridor, reaches Marjorie's lit kitchen, hears patrons and mugs, feels
  his revolver, and faces a decision.
