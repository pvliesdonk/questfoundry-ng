prose_summary: Harriet stands in the old mill with lantern; Edgar Barnes leans nearby and
  recites a riddle about a lost ledger burning beneath gears. She notes the rusted iron hatch
  to the cellar, a battered journal of protest arrests, and the missing ledger. Harriet fastens
  her badge, places her revolver against the lantern base, and prepares to choose.
