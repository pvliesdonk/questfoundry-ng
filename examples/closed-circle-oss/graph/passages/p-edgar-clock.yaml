variant_flag: flag:above-ground-search
prose_summary: Edgar Barnes enters the mill doorway, feels bomb tick, reads his folded note,
  mutters the rhyme, steps toward the iron latch that seals a hidden cellar, while Deputy
  Harriet Wellman holds a flickering lantern. The ticking bomb creates time pressure; the
  latch rattles, and Edgar steadies breath, using the rhyme as a map.
