prose_summary: Thea keeps coat buttoned and badge on lapel, watches tavern light. Edgar recites
  a riddle. Lucy places a folded scrap beside Thea’s cup; Thea takes the paper and tucks it
  under the cup. She watches moving shadows, notes tension, and decides to stay awake all
  night, guarding the secret hidden in the tavern.
