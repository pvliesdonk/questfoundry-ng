prose_summary: Mayor Caldwell stands in diner doorway; Lucy pulls alarm lever; bomb sits in
  back room; patrons flee. Harriet Wellman returns, flashes badge, removes Edgar Barnes’s
  handcuffs, whispers, frees him, eyes Blackwood Ledger. Lucy sweeps crowd with torch; player
  guides patrons, touches ledger, pulls trembling patron, sees ivory-handled knife, watches
  Edgar escape; Harriet declares his freedom, accusation remains unresolved.
