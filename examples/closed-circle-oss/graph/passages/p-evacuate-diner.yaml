prose_summary: Lucy Frost watches lantern, Harriet Wellman examines ledger fragment linking
  Edgar Barnes to hidden debt; a patron testifies Edgar near cellar and argues with victim.
  Lucy orders crowd to the swinging door exit. Edgar recites rhyme; bomb timer ticks under
  floor. Lucy pulls alarm lever, blows whistle, guides family and elderly man outside. Rumor
  reveals Lucy’s brother handled Blackwood ledger.
