id: passage:p-evacuate-diner
summary: Lucy raises the alarm and guides the diner’s occupants to safety as they evacuate,
  while Harriet reconsiders Edgar’s alibi amid clashing testimonies, a lingering eerie rhyme,
  and rumors of a framing, heightening uncertainty about the true murderer.
