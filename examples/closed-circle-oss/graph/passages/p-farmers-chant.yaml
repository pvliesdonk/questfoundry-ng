id: passage:p-farmers-chant
summary: Thea watches a fire as the farmer union gathers in the town square, chanting for
  fair rates, and Harriet observes from the perimeter, noting the widening rift.
entities:
- character:thea-swan
- faction:farmer-union
- character:harriet-wellman
prose_summary: Lucy stands by firepit; Thea watches fire; farmer union chants for fair rates
  in plaza; Harriet observes rift; Lucy smashes crystal glass on pit, creating tremor; tremor
  damages half‑burned Blackwood Ledger, blackening pages and raising ash; Harriet grips revolver;
  tension between union and town authority rises.
