prose_summary: 'Lucy serves whiskey to Marjorie, reveals the Blackwood ledger ties Mayor Caldwell
  to the Farmer Union and is hidden in the mill’s safe; Harriet displays her badge beside
  an ornate ivory‑handled knife; Lucy keeps the glass, then faces a decision: pursue the ledger’s
  location through the doorway or attend to the ominous knife.'
