prose_summary: Marjorie leans over stone altar, brushes her apron on it, and reads Blackwood
  ledger beside a candle. She notes the blank line for the ivory-handled knife. A murmur sounds,
  altar trembles, and her palm feels an echo of gears, indicating ledger’s secret ties to
  mill mechanisms. She links missing knife to a record; tremor urges her onward.
