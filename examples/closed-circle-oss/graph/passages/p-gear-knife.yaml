prose_summary: Harriet stands in the diner's backroom as Old Man Well mentions hidden mechanisms
  and tunnels under the mill; she places a crumpled warning note into her coat pocket, spots
  an ivory-handled knife embedded in a loose floorboard, feels the scar on her cheek, and
  tightens her grip on the note, prepared to follow the hinted tunnel, leaving her shaken.
