prose_summary: Edgar watches Thea Swan take a leather notebook, uncaps a dark ink vial, and
  write a hidden entry that stays invisible without fire. Silas "Old Man" Well whispers of
  a nurse scandal sealed in town archives. Edgar feels his revolver and failing lantern. He
  can read the entry aloud to expose the scandal or stay silent, keeping secret buried.
