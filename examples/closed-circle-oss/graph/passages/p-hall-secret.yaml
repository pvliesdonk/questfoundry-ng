id: passage:p-hall-secret
summary: Thea slips into the infirmary hiding her scarred wrist and avoids Lucy’s gaze; Lucy
  leans in to whisper a town scandal that makes Thea stiffen in fear, while Harriet discovers
  a newspaper clipping exposing a nurse‑donor fraud scandal.
entities:
- character:thea-swan
- character:lucy-frost
- character:harriet-wellman
prose_summary: Edgar slips through infirmary doorway; Thea enters, covers wrist scar, avoids
  Lucy, walks to empty cot. Lucy leans, lantern glows, whispers donor‑fraud rumor. Harriet
  pulls charts, unfolds newspaper clipping about nurse fraud, pockets it. Bomb ticks in community
  hall; Edgar feels revolver, pushes door toward hall. Draft smells oil; lantern reveals ornate
  knife in evidence locker. Edgar steps into hallway.
