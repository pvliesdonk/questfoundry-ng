prose_summary: Harriet Wellman questions Lucy Frost about a concealed device under the counter;
  Lucy gives a frantic report. Marjorie Lynch pleads to keep the diner doors open. Thea Swan
  bursts in, places a tray, and eyes the rusted iron cellar door. Harriet rests her badge
  on her chest, demands more specifics, and tension mounts.
