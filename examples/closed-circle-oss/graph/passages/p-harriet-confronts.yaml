id: passage:p-harriet-confronts
summary: Deputy Harriet steps forward, badge flashing beside Lucy's trembling hands, and demands
  to know what troubles the patrons; Lucy's frantic report and Marjorie's lingering plea hang
  in the air as Thea bursts in, tray clenched tight.
