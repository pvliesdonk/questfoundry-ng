id: passage:p-harriet-firepit
summary: Harriet watches ash curl from the Blackwood Ledger by the firepit as Edgar Barnes
  mutters a riddle about unpaid favors, underscoring lingering, smoldering secrets.
entities:
- character:harriet-wellman
- character:edgar-barnes
- object:ledger-blackwood
prose_summary: Harriet stands beside firepit, examines Blackwood Ledger as Edgar Barnes recites
  rhyme. She feels scar tighten, hears farmer union chant, grips revolver, notes mud‑streaked
  bootprint toward narrow arch, sees ash on coat cuff, watches ledger pages curl, and a spark
  reveals an imprint of a missing ivory‑handled knife beside ledger. Decision pending, tension
  rises.
