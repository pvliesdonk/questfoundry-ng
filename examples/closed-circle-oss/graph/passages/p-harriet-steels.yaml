prose_summary: Harriet stands behind counter as Lucy orders patrons to flee; a bomb ticks
  in back room, Edgar Barnes watches uncuffed; Harriet feels revolver, badge, scar, and a
  ledger exposing mayor’s dealings; Lucy shouts evacuation; Harriet steadies herself for the
  explosion, bearing duty cost of possible casualties. She is resolute.
