id: passage:p-harriet-union-support
summary: Harriet publicly refuses to use force against the striking farmers, prompting union
  leaders to applaud and a surge of hope among the protesters. Elite council members watch
  from the town hall with stern looks, their disapproval beginning to undercut the celebration.
