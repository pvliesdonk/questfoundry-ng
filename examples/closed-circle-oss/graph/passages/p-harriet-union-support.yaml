prose_summary: Harriet speaks on Union platform, refusing a weapon; farmers chant and clutch
  tools. Union leaders applaud, raising hope. Council members appear on balcony, stare and
  rebuke; Mayor Caldwell adjusts gold tie. Edgar Barnes whispers a riddle about the Blackwood
  ledger to Lucy Frost. Square remains tense, fragile peace.
