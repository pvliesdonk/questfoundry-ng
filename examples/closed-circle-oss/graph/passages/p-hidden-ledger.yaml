prose_summary: Mayor Caldwell feels floor vibrate as furnace rumbles; brass‑bound safe with
  iron latch stands near lantern. Harriet leans on metal rail, watching patrons. Marjorie
  leans to safe, sees thin glass sealing the Blackwood Ledger, whispers that it records Caldwell’s
  hidden debts. Caldwell grasps Harriet’s forearm, thanks her, and smiles; the ledger stays
  locked, secrets intact.
