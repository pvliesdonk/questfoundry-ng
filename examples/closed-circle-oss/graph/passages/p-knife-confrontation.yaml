prose_summary: Lucy steadies revolver. Mayor Caldwell reads Blackwood ledger, notes debts
  and his name. Harriet Wellman, scar trembling, confronts Clifford about ivory-handled knife
  and council clerk murder, demands truth, cites missing ledger. Clifford denies, shows knife
  hidden under jacket. Tension rises; firepit burns.
