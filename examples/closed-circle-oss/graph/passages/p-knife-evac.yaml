id: passage:p-knife-evac
summary: Harriet receives Thea's note, handcuffs Edgar as the ornate knife catches a stray
  beam, and Lucy blows the whistle to evacuate patrons while a bomb ticks in the kitchen;
  the knife's reveal ignites townwide wrath, and a distant gunshot rings as Harriet logs the
  evidence.
