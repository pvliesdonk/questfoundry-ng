prose_summary: Clifford stands by the evidence room door as furnace hisses. Silas directs
  Harriet; she takes the ivory-handled knife, locks it in a brass-faced locker, leaves a fresh
  fingerprint imprint, and records it in the ledger. Harriet notes the missing scabbard, implying
  a second weapon. Clifford discovers an east arch tunnel, enters, hearing gears, heading
  toward the old mill.
