id: passage:p-knife-ledger
summary: An ornate ivory-handled knife lies slack in dust by the doorway, its edge catching
  the squad's radio flicker, while Edgar Barnes mutters from the shadowed hallway about a
  cursed ledger of names, seeding the air with the scent of debts and hidden secrets.
