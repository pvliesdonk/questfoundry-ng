prose_summary: Lucy Frost stands in back‑room doorway; bomb ticks, rain on walls. An ivory‑handled
  knife lies on dust near threshold. Edgar Barnes enters, mentions cursed ledger with names.
  Harriet Wellman enters, badge and revolver, records bomb, muttering, knife, radio in notebook.
  Radios pulse, rain drums. Lucy feels town’s future balanced on metal and ink.
