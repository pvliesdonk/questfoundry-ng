prose_summary: Lucy stands at bar, receives folded note demanding return of ivory-handled
  knife. Clifford lifts knife, puts note in coat pocket. Mayor Caldwell enters firepit room,
  opens missing leather ledger, reads his own name among debts, confirming ledger's return.
  Lucy grips revolver, weighs next move, which now costs a shot.
