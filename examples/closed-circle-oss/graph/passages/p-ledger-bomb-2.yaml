id: passage:p-ledger-bomb-2
summary: Harriet discovers a torn fragment of the Blackwood Ledger in Edgar’s garden, confronts
  his alibi under Mayor Caldwell’s pressure for a swift arrest, while Lucy pries the bomb
  apart, a splinter of metal cutting her palm, and averts the explosion.
