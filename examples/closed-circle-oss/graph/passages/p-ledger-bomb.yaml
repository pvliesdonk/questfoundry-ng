id: passage:p-ledger-bomb
summary: Lucy eyes the sealed ledger, which now pulses like a ticking bomb, its hidden secrets
  poised to erupt.
entities:
- character:lucy-frost
- object:ledger-blackwood
prose_summary: Mayor Caldwell moves to the furnace, places the Blackwood Ledger on an iron
  slab, and watches Lucy Frost stare at it. He feels a pulse, judges the ledger a concealed
  explosive, notes Lucy’s curiosity, hears crowd chant and gears, and senses a murmur. He
  tightens his coat strap and decides whether to keep the ledger sealed until council decides.
