id: passage:p-ledger-hidden
summary: Caldwell locks the ledger in a hidden safe, keeping its contents intact; Harriet
  grows wary, questioning his opaque motives. The sealed ledger sits in the clerk’s vault
  as the farmer union’s cries for transparency swell.
entities:
- object:ledger-blackwood
- character:mayor-caldwell
- character:harriet-wellman
- faction:farmer-union
prose_summary: Mayor Caldwell enters clerk’s vault, closes iron door, takes warm Blackwood
  Ledger from metal tray, places it in hidden safe behind false panel installed by his aide,
  locks it. Harriet Wellman observes, Lucy Frost watches the sealed ledger. Farmer union chants
  demand transparency. Caldwell sees Old Mill lantern, notices ornamental knife glint, sees
  hooded figure enter mill.
