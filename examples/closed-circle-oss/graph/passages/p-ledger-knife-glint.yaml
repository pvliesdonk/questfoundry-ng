id: passage:p-ledger-knife-glint
summary: Harriet catches a fragment of Old Man Well's mutter that links the Blackwood Ledger
  to the distant gunshot, imprinting a sense of concealed corruption as the diner doors swing
  shut, and Lucy spots the missing Ornate Knife's tip catching the river's sheen, adding a
  cold, metallic tension beneath the fragile calm.
