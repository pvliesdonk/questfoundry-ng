prose_summary: Harriet pins badge to chest, watches bridge railing. Old Man Well shuffles
  forward, mutters ledger, Blackwood, gunshot, linking hidden account to distant shot; shot
  echoes off canal. Diner doors slam, sealing room. Lucy, scarred palm, lifts brass lantern,
  looks at river; Harriet sees missing tip of Ornate Knife drop into water, danger persists.
