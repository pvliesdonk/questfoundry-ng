prose_summary: Lucy stands at furnace mouth; Mayor Caldwell holds the Blackwood ledger, sees
  his own debt and scowls. Harriet confronts Clifford Moon about the missing sheath of the
  ornate ivory knife linked to the murder, demanding explanation while gripping the ledger.
  Clifford remains silent, tension rises, iron doors loom, Lucy feels her revolver and the
  stairway pull.
