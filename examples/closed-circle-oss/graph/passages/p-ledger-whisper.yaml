prose_summary: Harriet enters the cellar, opens the iron latch, finds a bloodied knife on
  a stone slab and an open ledger. A voice reveals the Blackwood Ledger is hidden beneath
  floorboards. Thea stands at the doorway, trembling; Lucy watches with revolver as a bomb
  ticks. Harriet touches the ledger edge, notes fresh dust.
