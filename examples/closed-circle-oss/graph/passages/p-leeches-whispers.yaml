prose_summary: Clifford Moon whispers the code word leeches behind the diner counter; Marjorie
  Lynch hears it. Lucy Frost enters, warns Marjorie not to accuse without proof, saying rumor
  will spark chaos. Diners fall silent; Clifford feels pressure. Outside market stalls open,
  cobblestones glisten, and Clifford sees a street path leading deeper into Grayhaven.
