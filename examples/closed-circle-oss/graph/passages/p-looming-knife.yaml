prose_summary: Lucy lingers by the sealed ledger in Old Man Well’s workshop; the clock ticks,
  the ledger trembles, an ivory‑handled knife clinks against a pipe, and she tightens her
  revolver strap. She presses her palm to the ledger, feeling its vibration and a cold dread.
  No new resources are spent; the ledger’s hidden content remains unrevealed.
