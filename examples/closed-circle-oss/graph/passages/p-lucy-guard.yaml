prose_summary: Lucy Frost slips between booths, pushes a trembling patron back and grasps
  his elbow. She spots an ivory-handled knife blade under a table, removes it, noting its
  sheath is missing. She holds the blade, vows to guard the missing sheath secret, notes lingering
  timber smell as firebrand evidence, and exits as winter wind rattles the door.
