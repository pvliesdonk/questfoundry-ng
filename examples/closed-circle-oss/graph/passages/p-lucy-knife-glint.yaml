id: passage:p-lucy-knife-glint
summary: Lucy cries a jagged warning as terrified townsfolk scramble toward the darkened street
  where a bomb ticks beneath the clatter, and a stray beam flashes off her ornate knife, freezing
  her breath and marking the moment of imminent danger.
