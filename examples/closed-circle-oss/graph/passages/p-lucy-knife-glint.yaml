prose_summary: Lucy Frost shouts warning in the crowded diner, spots an ivory-handled knife
  on a stone slab, and smells smoldering timber. She grabs a brass whistle, blows a note that
  pulls the townsfolk away from a ticking bomb. Her scarred palm throbs as the bomb hisses
  louder; she keeps the whistle steady while danger remains.
