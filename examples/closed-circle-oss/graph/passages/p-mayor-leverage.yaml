prose_summary: Caldwell lingers in Marjorie's Diner doorway as rain falls; Lucy Frost orders
  patrons out the swinging doors. Caldwell sweeps evacuees away from street, keeps calm, hovers
  hand over hidden Blackwood Ledger on the counter. He notes the Old Mill’s shadow and the
  inactive bomb in the back room. His reputation now costs the ledger’s leverage.
