id: passage:p-mill-knife
summary: Lucy Frost steps into the abandoned Old Mill as the wind rattles loose boards and
  a hidden clockwork ticks, marking the town’s halted time. She catches the glint of an ornate
  knife half‑buried in ash, a cold reminder of violence.
