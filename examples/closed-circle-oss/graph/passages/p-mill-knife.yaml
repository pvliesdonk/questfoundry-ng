prose_summary: Lucy Frost enters the mill, lights lantern, notices an ivory-handled knife
  in ash, kneels, grasps and removes it, discovering its missing sheath and a hidden clockwork
  tick; she now carries the ornate knife as a new resource, hinting at another concealed weapon.
