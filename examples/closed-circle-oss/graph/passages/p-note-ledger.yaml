id: passage:p-note-ledger
summary: A smeared, urgent note demanding the knife's return slides into Clifford's pocket
  while Mayor Caldwell opens the Blackwood Ledger and scans its stained names and debts.
entities:
- character:clifford-moon
- character:mayor-caldwell
