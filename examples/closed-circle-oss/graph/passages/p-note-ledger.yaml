prose_summary: Lucy reads a note demanding the ivory‑handled knife be returned, then hides
  the note in Clifford Moon’s coat pocket. Mayor Caldwell opens the Blackwood Ledger, sees
  his name marked with a black scrawl among red lines. The ivory‑handled knife lies on the
  table, Lucy keeps her revolver ready, and the furnace continues humming.
