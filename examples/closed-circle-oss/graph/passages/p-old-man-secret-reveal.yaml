prose_summary: Harriet emerges from tunnel, grabs blood‑stained ivory‑handled knife (sheath
  missing), lifts it while her deputy badge presses to her chest. Silas watches; townspeople
  shift from uncertainty to resolve as they see the murder evidence. Mill gears hum, secret
  passage stays dark. Silas feels a choice looming.
