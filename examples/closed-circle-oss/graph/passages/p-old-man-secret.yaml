prose_summary: Clifford stands at old mill slab; Harriet examines foundation seam and hears
  draft indicating tunnel; Thea warns it may be unsafe; Harriet doubts Silas’s sanity, calls
  it trap; Mayor Caldwell’s warning about rumors is heard; Lucy follows fresh footprints to
  ivy‑covered wall, finds iron latch and concealed cellar door; inside glints ornate knife;
  Clifford feels choice.
