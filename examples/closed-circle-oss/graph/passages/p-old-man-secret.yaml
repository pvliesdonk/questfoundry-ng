id: passage:p-old-man-secret
summary: Harriet discovers a faint draft in the mill’s foundation that hints at a secret tunnel;
  Thea warns the passage may be unsafe while Harriet doubts Silas’s sanity, and Lucy follows
  fresh footprints toward a concealed cellar door.
