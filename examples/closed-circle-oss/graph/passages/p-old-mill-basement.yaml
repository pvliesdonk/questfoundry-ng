id: passage:p-old-mill-basement
summary: Lucy sets up a makeshift counter and Thea tends the lanterns while Mayor Caldwell
  arrives to promise calm amid the gossip‑filled basement hall, which hums with tension. In
  a cramped corner, Clifford lifts and polishes an ornate ivory‑handled knife, its glint catching
  the dim lamplight.
