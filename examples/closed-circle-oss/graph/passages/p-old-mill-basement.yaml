- character:mayor-caldwell
- character:clifford-moon
- object:ornate-knife
prose_summary: Lucy places a crate as counter, puts a mug and torn ledger on it. Thea installs
  lanterns in iron‑bound beams, lighting the vaulted hall. Mayor Caldwell enters, raises hands
  to promise calm. Clifford Moon draws Lucy’s recovered ivory‑handled knife, sharpens it on
  the scarred table, and receives Lucy’s urgent note slipped into his pocket. Furnace hums
  below.
