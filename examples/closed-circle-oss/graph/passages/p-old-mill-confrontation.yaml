prose_summary: Clifford leaves market square, walks to Old Mill, meets Silas Well who warns
  'Force shatters peace'. Gear clatters, an Ornate Knife lies on ash; its sheath missing suggests
  another hidden weapon. Clifford takes the knife, stores it in coat, nods to Silas, and heads
  to the evidence locker to give the weapon to Harriet.
