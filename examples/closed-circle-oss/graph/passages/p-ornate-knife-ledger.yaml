prose_summary: Lucy holds warm wrench after bomb ends, sees Ornate Knife in ash, presses bomb
  casing, red wire snapped. Harriet exits back door, goes to garden, finds lantern light on
  torn ledger fragment, reads half‑written name. Bomb disarmed, red wire removed, knife remains.
  Night wind blows, pine and iron scent noted.
