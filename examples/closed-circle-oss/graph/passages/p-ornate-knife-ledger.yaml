id: passage:p-ornate-knife-ledger
summary: Lucy glimpses the ivory‑handled Ornate Knife on the floor as the bomb is disarmed,
  the weapon's chill lingering as a warning. Harriet scans a torn ledger fragment in Edgar’s
  garden, reading a half‑written name that hints at unseen debts.
