prose_summary: Clifford stands behind diner counter; Lucy’s warning about rumors lingers.
  Thea approaches table, examines sealed package with wheat‑hammer emblem, eyes widen, triggering
  Clifford’s memory. Marjorie hides behind flour sacks, tails Clifford to catch him. Lantern
  sputters, river hums outside, adding tension.
