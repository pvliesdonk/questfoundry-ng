prose_summary: On June 14, 1887 the deputy records that Edgar Barnes is cuffed and moved to
  the holding cell. Lucy Frost arrives bruised from a slipped wrench, reports the bomb’s red
  wire snapped and the device lies inert, its ornate knife sheath missing. Townsfolk murmur
  disapproval of the teacher’s arrest, and the deputy exits into the cold night.
