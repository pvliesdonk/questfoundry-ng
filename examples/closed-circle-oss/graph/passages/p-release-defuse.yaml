prose_summary: Mayor Caldwell warns Harriet Wellman that mercy costs budget trim; Harriet
  says evidence does not bind Edgar Barnes, freeing him. Edgar discards singed paper fragment.
  Lucy Frost uses wrench to cut bomb’s red cord, defuses device, suffers forearm burn, patches
  it. Farmer union raises tools, chants, supports Harriet. Caldwell notes budget warning persists
  as town balances caution and union confidence.
