prose_summary: Mayor Caldwell enters diner, warns Harriet Wellman that freeing Edgar Barnes
  will trigger fines and freeze merchants’ credits. Harriet releases Edgar, Lucy Frost orders
  evacuation through swinging doors while a lantern-lit bomb ticks down. Farmer union members
  rally behind Harriet. Harriet records a distant gunshot in a notebook. Lucy escorts crowd
  out; mayor stays alone as bomb continues counting down.
