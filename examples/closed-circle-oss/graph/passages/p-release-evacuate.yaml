id: passage:p-release-evacuate
summary: Harriet releases Edgar, defying the mayor and the elite, while Lucy rushes the diners
  out as the bomb timer counts down; the town fractures between the mayor’s fury, the farmer
  union’s support, and Harriet’s solitary resolve.
