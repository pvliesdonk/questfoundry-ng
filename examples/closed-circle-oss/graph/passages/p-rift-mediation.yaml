prose_summary: Lucy stands by the furnace as townsfolk gather; Harriet watches. Mayor Caldwell
  climbs onto the ledger table, raises his hand, and announces a forced mediation meeting
  between growers and elite, warning of consequences. Lucy notes his thin reassurance, tightens
  her revolver strap, and waits, implying imminent conflict.
