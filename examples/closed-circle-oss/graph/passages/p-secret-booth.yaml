id: passage:p-secret-booth
summary: Lucy slides into the dim booth beside Edgar, who mutters a riddling clue about the
  Blackwood ledger while Harriet notes the tension; as the bomb’s final spark sputters out,
  the trio rises, rejoining the frantic din, each bearing a faint echo of hidden leverage
  that could tip the town’s fragile balance.
