id: passage:p-secret-ink
summary: Thea slips into the clinic concealing a scarred wrist and avoids Lucy’s gaze; Lucy
  whispers about a long‑buried town scandal, making Thea tense with fear of exposure, while
  Harriet discovers a newspaper clipping that reveals a nurse‑donor fraud scandal tied to
  the same secret.
entities:
- character:thea-swan
- character:lucy-frost
- character:harriet-wellman
prose_summary: Edgar Barnes stands at clinic counter. Thea Swan enters, hides bruise, avoids
  Lucy Frost. Lucy whispers about the unresolved donor scandal. Harriet Wellman places a newspaper
  with headline Nurse Donor Fraud Exposed, flips to a sticky clipping, and leaves a cracked
  leather diary with a fading ink line. Edgar feels secret pressure.
beats:
- beat:secret-ink-pre-1
- beat:secret-ink-pre-2
- beat:secret-ink-pre-3
choices:
- label: Slip a fading ink entry into the hidden diary
  to: passage:secret-ink-whispers
