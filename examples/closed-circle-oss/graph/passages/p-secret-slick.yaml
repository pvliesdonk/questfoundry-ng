id: passage:p-secret-slick
summary: Harriet emerges from the secret passage, bruised and blood‑streaked, the walls slick
  with gore. The mounting evidence presses heavily on her shoulders, amplifying the grim tension.
entities:
- character:harriet-wellman
- character:old-man-well
prose_summary: Harriet enters the tunnel mouth, feels cold, sees blood‑slick walls and hears
  Silas’s crowd and mill gears. She notices a worn stair leading to a soot‑stained doorway
  where Lucy shines a lantern on ash‑covered tables. Harriet smells iron, raises her ivory‑handled
  knife, and faces the cellar entrance, preparing to descend deeper.
