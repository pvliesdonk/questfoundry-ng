id: passage:p-secret-tunnel-encounter
summary: Harriet follows Silas into the mill’s secret passage, a torch‑lit tunnel that reverberates
  with the killer’s footsteps, and she confronts the murderer in a hidden chamber, where a
  fierce struggle erupts.
entities:
- character:harriet-wellman
- character:old-man-well
- location:old-mill
- object:ornate-knife
prose_summary: Silas opens stone hatch, enters tunnel with Harriet; they hear murderer ahead.
  They spot the Ornate Knife half‑buried in debris. They reach hidden chamber, confront cloaked
  murderer with blood‑stained knife. Harriet draws revolver, shoots, wrests ivory‑handled
  knife, kills murderer. Knife now in Harriet’s possession; hunt may continue deeper in the
  mill.
