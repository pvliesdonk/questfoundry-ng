prose_summary: Edgar tightens badge, holds revolver; lantern sputters. Figure passes iron
  doorway, leaves fading footprints, disappears down hallway. Bomb ticks from cracked pipe.
  Lucy places bloodied ivory knife on slab, steps back. Harriet takes knife, puts it in evidence
  locker, latch snaps. Thea touches hidden scar, watches locker. Lucy watches locker and bomb.
  Iron door to Marjorie's diner stays latched.
