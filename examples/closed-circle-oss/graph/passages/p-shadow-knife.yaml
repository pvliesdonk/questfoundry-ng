id: passage:p-shadow-knife
summary: A shadowy figure flees, leaving dusty footprints; Harriet retrieves and seals the
  bloodied knife as evidence, fulfilling the riddle's purpose while the mystery deepens, as
  Thea watches and Lucy watches warily.
