prose_summary: Mayor Caldwell stands beside the brass‑bound safe holding the sealed Blackwood
  Ledger; Harriet Wellman orders the watchman to cuff the farmer‑union members, who are arrested
  and forced to kneel. The farmers file out angry, promising retaliation. Marjorie Lynch warns
  Caldwell that the ledger contains ruinous debts. Caldwell thanks Harriet, aware the union
  threat lingers.
