id: passage:p-thea-confession
summary: Thea publicly admits the scandal that forced her exile; Lucy softens the atmosphere
  with a whiskey and supportive glance, while Mayor Caldwell urges her to leave to protect
  the town’s image, and Harriet confronts his request.
