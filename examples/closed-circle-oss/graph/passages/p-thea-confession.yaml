prose_summary: Thea confesses forged records and betrayal, triggering a town debate. Lucy
  gives Thea a glass of amber whiskey, sharing resolve. Mayor Caldwell urges Thea to leave
  Grayhaven to protect its image. Harriet challenges him, demanding truth and accountability.
  The Old Mill’s back door is ajar, possibly containing the Blackwood ledger. Thea must stay
  for debate or enter the mill.
