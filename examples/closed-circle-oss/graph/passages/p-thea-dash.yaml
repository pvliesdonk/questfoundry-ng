prose_summary: Lucy watches Thea throw a glass vial of serum; a ticking bomb pulses behind
  the diner's back door. Lucy breaks from the crowd, runs, reaches Thea as she jumps the wall,
  grabs the vial, returns to the diner, places it on a cracked table beside the device, and
  faces a choice that will decide if the serum saves lives.
