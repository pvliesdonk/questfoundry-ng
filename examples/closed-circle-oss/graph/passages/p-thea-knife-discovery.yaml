prose_summary: Edgar watches Thea enter with a tray, halts at the basement door, and sees
  an ornate knife on a slab. He follows her to a stone altar where the knife rests, hears
  a whispered accusation that it is false, spots a shadow and dusty footprints, and can (1)
  listen, (2) lean toward altar, (3) follow footprints. He carries a revolver.
