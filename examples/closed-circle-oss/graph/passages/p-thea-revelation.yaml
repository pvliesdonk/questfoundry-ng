id: passage:p-thea-revelation
summary: In the diner, Thea calmly confesses her hidden past, filling the space with tentative
  hope and uneasy optimism.
entities:
- character:lucy-frost
- character:thea-swan
- character:marjorie-lynch
prose_summary: Thea reveals forged records and denied care scandal that expelled her from
  infirmary. Lucy Frost holds wrench, pulls alarm lever twice, rings bell, urges patrons to
  exit. Patrons leave. Lucy swings wrench, bites red wire, severs circuit, wire snaps, hiss
  stops. Wrench stays on counter; room quiet, tension rises.
