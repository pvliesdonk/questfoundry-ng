id: passage:p-whisper-night
summary: Lucy slips Thea a discreet warning about eavesdroppers in the diner, and Thea spends
  the night guarding the secret, a pulse of tension under her skin while the town remains
  oblivious.
entities:
- character:lucy-frost
- character:thea-swan
prose_summary: Thea receives Lucy’s crumpled warning note about hidden eavesdroppers, notes
  Lucy’s shaved head and scar, folds the note and hides it in her inner coat pocket, then
  patrols the tavern, watching empty booths and the forge, remaining on guard until dawn.
  She sustains vigilance cost of time and exposure.
