prose_summary: Lucy Frost stands in the doorway as a patron whispers that her brother was
  seen moving the Blackwood ledger. She notices smoke scented of timber from the Old Mill,
  hears the night alarm, grips the bar, and records the empty seat and ash where the ledger
  discussion occurred. She feels uneasy.
