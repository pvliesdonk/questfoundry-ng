id: passage:p-whispered-loyalty
summary: A patron whispers that Lucy Frost’s brother was seen handling the ledger‑blackwood,
  raising uneasy suspicion that loyalty may betray justice, and the faint smell of smoldering
  timber from the Old Mill drifts into the diner, suggesting hidden fire‑brand evidence could
  ignite the town’s fragile order.
