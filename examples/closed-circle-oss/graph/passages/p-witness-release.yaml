prose_summary: Harriet announces Edgar's release, overturning the alibi doubt; Lucy cuts the
  bomb’s red wire with a wrench, injuring her forearm and defuses the device; Edgar flees,
  leaving a half‑burned scrap of paper; Mayor Caldwell notes tension easing, warns of upcoming
  budget cuts; handcuffs fall; the old mill’s broken tower looms under lantern light as a
  new choice.
