id: passage:p-witness-release
summary: Harriet announces Edgar's release, trusting his alibi, while Lucy tears into the
  bomb and suffers a burn to neutralize it; Edgar vanishes into the woods, leaving a half‑burned
  scrap, and Mayor Caldwell's warning about budget cuts looms over Harriet as the diner crisis
  ends but the murder charge remains open.
