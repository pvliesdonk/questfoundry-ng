prose_summary: Silas watches Harriet exit mill, badge on chest, scar visible. He mentions
  hidden river‑stone passage; Harriet dismisses it and ignores iron latch. She searches woods,
  brushes branches, pauses at logs, crosses fallen log, calls a name, finds nothing. After
  hours she returns, coat sap‑covered, re‑secures badge. Silas remembers ledger in floorboard
  compartment; tunnel unused, murderer unseen; choices remain.
