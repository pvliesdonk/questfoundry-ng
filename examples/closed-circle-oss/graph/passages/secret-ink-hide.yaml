id: passage:secret-ink-hide
summary: Thea retreats into the shadows, concealing her scandal and feigning normalcy while
  constantly glancing over her shoulder, her breath shallow with fear, and Harriet notes Thea’s
  nervousness in her journal, questioning what lies beneath the calm.
entities:
- character:thea-swan
- character:harriet-wellman
prose_summary: Thea enters soot‑blackened tavern, hides badge, sits at hearth bench. Lucy
  slides scrap of paper to Thea. Edgar recites rhyme about shadows and river. Harriet records
  Thea’s trembling hand in notebook, writes question about Thea’s secret. Thea feels chill
  and panic, leaving the scene tense.
