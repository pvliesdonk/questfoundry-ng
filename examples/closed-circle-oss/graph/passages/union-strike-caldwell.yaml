id: passage:union-strike-caldwell
summary: Council members frown, tightening political pressure on Harriet’s department, while
  Mayor Caldwell’s debate with the council chips away at his public image; when the debate
  ends, an uneasy calm spreads through Grayhaven.
entities:
- character:mayor-caldwell
- character:harriet-wellman
prose_summary: Mayor Caldwell addresses council, faces challenge over union protest; debate
  ends, city quiets. Deputy Harriet Wellman leaves council, walks bridge with Marjorie hearing
  farmer march; Lucy Frost polishes bar, notices ornate ivory-handled knife; Old Man Well
  mutters about hidden ledger in old mill, Marjorie overhears clue. Three future paths await
  Harriet.
