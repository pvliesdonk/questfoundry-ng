premise: An Agatha Christie closed circle murder mystery that escalates Fargo style.
genre: Mystery
subgenre: Closed‑circle darkly comic thriller
tone: tight, suspenseful, mordant, with a slow‑burn tension that erupts into gritty, absurdist
  violence
themes:
- order versus chaos
- justice versus self‑preservation
- truth against deception
audience: Fans of classic whodunits and darkly comic crime drama, mature teens and adults
  (16+)
content_notes:
  include:
  - sharp, clue‑laden dialogue
  - layered red herrings
  - gradual escalation of violence into dark humor
  - moral ambiguity and reluctant alliances
  - mid‑20th‑century rural setting details
  avoid:
  - excessive gore without narrative purpose
  - explicit sexual content beyond implication
  - anachronistic slang or technology
  - supernatural or fantastical elements
pov_hint: Rotate limited third‑person narration among each key suspect, interspersed with
  the lead investigator’s first‑person journal entries for reflective insight.
scope: medium
words_target: 55000
