pov: third person limited, rotating at passage boundaries among Clifford Moon, Edgar Barnes,
  Harriet Wellman, Lucy Frost, Marjorie Lynch, Mayor Caldwell, Silas "Old Man" Well, Thea
  Swan
tense: past
diction: spare, salt-worn, mordant
rhythm: default to straightforward, complete sentences of varied length; reserve longer, cadence‑rich
  sentences for moments of tension or revelation
imagery: cold steel, cracked pine, soot‑blackened windows, winter wind, ticking gears, iron
  clang; dread lives in objects and shadows, never in overt similes
dialogue: brief, unornamented; speech tags limited to 'said' or omitted
banned:
- exclamation marks
- rhetorical questions to the reader
- second-person address
- sentences opening with a participial phrase
notes: Apply the voice's heightened diction and imagery only at pivotal beats; keep narrative
  clarity front and center.
interlude: first-person past-tense journal entries (Harriet Wellman)
