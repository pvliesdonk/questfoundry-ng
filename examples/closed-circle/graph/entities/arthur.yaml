id: character:arthur
name: Arthur Pendelton
concept: A bumbling accountant who thought he was hired to cook the books, not help dispose
  of the cook.
pronouns: he/him
base:
  appearance: Sweaty, clutching a briefcase to his chest like a shield.
  manner: Apologizes profusely before, during, and after making terribly selfish decisions.
  pacing_habit: His pacing features sharp, precise pivots precisely upon reaching the fringed
    border of an area rug.
  oenological_superstition: Maintains a highly specific, unwavering belief that vintage Bordeaux
    will physically absorb and be ruined by any nearby atmospheric indelicacies, particularly
    those originating from unseemly domestic crises.
  footwear: Arthur favors heavily soled oxfords that produce an unseemly volume upon contact
    with hardwood flooring.
  posture_under_stress: Arthur instinctively clasps his leather briefcase tightly against
    his sternum whenever the social environment threatens to degrade into physical hostility.
  wardrobe_deficiency: Consistently overestimates the thermal efficiency of his seasonal tailoring
    during indoor climate failures.
  briefcase_material: Arthur insists upon carrying a rigidly structured, brass-reinforced
    leather briefcase to provide a tactile illusion of uncompromising professional stability.
  footwear_style: Wears highly polished oxfords, meticulously maintained regardless of the
    environmental conditions.
