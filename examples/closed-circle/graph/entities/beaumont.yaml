id: character:beaumont
name: Beaumont 'Beau' Sterling
concept: The fiercely polite host who cares more about the schedule of his weekend dinner
  party than the bodies piling up in his manor.
pronouns: he/him
base:
  appearance: Impeccably tailored velvet smoking jacket, slightly twitchy left eye.
  manner: Maintains an unyielding veneer of cheerful hospitality even while scrubbing blood
    off a Persian rug.
  facial_tic: His left eye develops a minute, rhythmic twitch whenever his meticulously planned
    schedule is threatened.
  stress_response: Beaumont forcefully buffs reflective surfaces to an immaculate shine whenever
    he is forced to process severe breaches of etiquette.
  habit: He habitually smooths invisible wrinkles from his lapel when bracing himself against
    breaches of etiquette.
  spatial_defense: When forced to physically obstruct a doorway, Beaumont unconsciously adopts
    the wide, lateral stance of a classical fencer to maximize his horizontal presence.
  sartorial_restriction: Consistently specifies a narrow shoulder cut on his tailored jackets,
    inadvertently making wide-armed gestures physically taxing.
  footwear_preference: Favors highly polished patent leather oxfords for evening entertainment,
    adhering to a strict personal standard for their flawless mirror finish.
  cuff_adjustment: Habitually adjusts his cuffs to reassert control immediately following
    any unseemly physical exertion.
  pain_concealment: Systematically disguises sudden, violent physical agony as intensely formalized,
    prolonged bows to avoid causing his guests undue alarm.
  crisis_posture: Locks his jaw and rigidly focuses on maintaining an upright posture to conceal
    profound physical distress from his guests.
  stance_width: Adopts a wide, lateral stance akin to a classical fencer when attempting to
    unconsciously command a room or obstruct a pathway.
  hospitality_metrics: He firmly categorizes a guest visibly shivering in the corridor as
    an etiquette failure of the utmost severity.
  textile_authority: Views the unauthorized foraging and relocation of domestic linens by
    shivering guests as a direct, unacceptable usurpation of his hostly authority.
  evasion_technique: Executes rapid backwards retreats with precisely measured steps to ensure
    his polished oxfords never scuff the parquet flooring, even under imminent mortal threat.
  conflict_resolution: Beaumont defaults to addressing physical brawls by loudly correcting
    the combatants' posture and grammar, entirely avoiding direct physical intervention.
  sartorial_crutch: Beaumont frequently relies upon the tailored constraints of his silk waistcoat
    to artificially maintain an appearance of strict posture during moments of severe physical
    exertion.
  soothing_gesture: He habitually smooths his cuffs to regulate his physical responses when
    confronted with severe breaches of decorum.
  posture: Maintains a sharply aligned, rigid spine as a physical barrier against encroaching
    domestic chaos.
  pocket_watch: Carries an antique, solid-gold half-hunter pocket watch of staggering financial
    value.
  woodwork_deference: He maintains a subconscious habit of affording antique mahogany furniture
    the exact same degree of respectful distance as a senior member of the clergy.
  emergency_linen: Secretes a meticulously folded square of high-absorbency cloth within his
    velvet smoking jacket to facilitate the immediate, unobserved eradication of sudden aesthetic
    blemishes.
  mental_calculus: Employs strict geometric reasoning to evaluate the volume of a standard
    provisions cupboard against the dimensions of unauthorized biological mass.
  barricade_posture: Habitually adopts a perfectly symmetrical stance when obstructing passages,
    prioritizing the pristine drape of his jacket over functional physical leverage.
  climatic_intolerance: Considers rapid barometric shifts and sudden drafts to be an entirely
    unacceptable intrusion of the outdoors upon a well-curated interior climate.
  curtain_handling: Approaches the operation of heavy window treatments as a strictly mathematical
    exercise, calculating the exact required tension to prevent undesirable atmospheric drafts.
  post-exertion-habit: He meticulously realigns his shirt cuffs immediately following any
    necessary application of blunt force, utilizing the sartorial adjustment to reassert his
    authority.
