id: character:sylvia
name: Sylvia Vance
concept: A hyper-critical, wealthy mother-in-law who views murder as an unforgivable breach
  of etiquette.
pronouns: she/her
base:
  appearance: Draped in pearls and an aggressively sharp cashmere shawl.
  manner: Delivers withering insults disguised as polite inquiries.
  weaponized_garb: She treats her aggressively sharp cashmere shawl less as a garment and
    more as an instrument of spatial dominance.
  social_critique: Sylvia frequently delivers unprompted monologues regarding the decline
    of modern vitality whenever she feels her companions are insufficiently engaged.
  footwear_cadence: Her approach is consistently telegraphed by a rhythmic, purposeful tapping
    of luxury footwear that serves to preemptively critique the posture of anyone within earshot.
  handwear: Maintains a strict adherence to wearing formal silk gloves indoors regardless
    of the climate or occasion.
  expression_of_displeasure: Initiates a slow, theatrical two-finger massage at her temples
    whenever external circumstances dare to inconvenience her constitution.
  beverage_attribution: She routinely attributes entirely unrelated physiological failures
    to the substandard sourcing of her host's chosen tea leaves.
  medical_denial: Sylvia views biological illness as a severe lapse in personal standards,
    firmly believing that a sufficiently stern constitution can repel any malady through sheer
    willpower.
  preference:linens: Demands exclusively imported textiles for all bedding arrangements, citing
    an intense susceptibility to substandard thread counts.
  table_standards: Fundamentally insists upon rigidly, mathematically spaced cruet stands
    at all dining occasions.
  posture_correction: Consistently rectifies her spinal alignment to an exacting perpendicular
    angle immediately following any unseemly physical exertion.
