pov: Third-person limited
tense: present
diction: Starch-stiff, impeccably formal, and archly detached.
rhythm: Elaborate, multi-clause declarations of etiquette that stubbornly refuse to accelerate
  for violence.
banned:
- exclamation marks (maintain an unflappable facade at all costs)
- modern colloquialisms, slang, or casual profanity
- visceral emotional labeling (e.g., 'terrified', 'horrified', 'panicked')
- phonetic sound effects or typed screams ('ahhh', 'thwack', 'gasp')
- ellipses trailing off into uncertainty
notes: Equate breaches of etiquette with mortal peril; a blood-stained Persian rug is described
  with the exact same gravity as the corpse bleeding onto it.
