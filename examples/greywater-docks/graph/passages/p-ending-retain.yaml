prose_summary: Elliot holds broken jade shards, refuses payment and walks away. Two crimson‑coated
  men watch; their leader notes the missing jade, orders a courier to plan a raid on Elliot’s
  safe house. Syndicate learns jade is gone; Lydia Vane leaves the pier, losing the cash envelope
  to the tide. Elliot’s pockets stay empty, his cure unavailable, he contracts fever and dies.
