prose_summary: Elliot collects jade shards on the pier, reforges them into a figurine, and
  hands it to Lydia. Lydia gains control of trade guilds. Elliot receives a cash envelope,
  uses the money to buy medicine needed for his illness. Lydia’s new power sparks a harbor
  gang war, fire and gunfire; Elliot watches from his window as his reputation fades.
