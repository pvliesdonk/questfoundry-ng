id: passage:p-intro
summary: Rain drenches Greywater’s neon streets and seeps into Elliot March’s cramped office
  where he feels the weight of a terminal diagnosis, just as Lydia Vane appears on the pier
  with a jade dragon and a quick‑cash proposal.
