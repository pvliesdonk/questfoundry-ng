pov: third person limited (Elliot March)
tense: past
diction: spare, salt-worn, literary
rhythm: Default to clear declarative sentences of 6‑15 words; occasional longer, clipped constructions
  appear only at moments of heightened tension.
imagery: rain‑slick streets, cold harbor steel, oily lantern glow, salt‑stained air; objects
  carry weight of dread.
dialogue: brief, unadorned; tags are only 'said' or omitted.
banned:
- exclamation marks
- rhetorical questions
- second-person address
- sentences starting with a participial phrase
notes: Keep the noir atmosphere in selective flourishes; let the plot and choices drive clarity.
