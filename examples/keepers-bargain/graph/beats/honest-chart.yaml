id: beat:honest-chart
summary: >-
  Before they go down, Elias spreads his finished chart on the table —
  the first honest map of the shoals, the sleeper's hollow drawn plain.
  Whichever way she chooses, the truth of the water is on paper now,
  and it is hers.
