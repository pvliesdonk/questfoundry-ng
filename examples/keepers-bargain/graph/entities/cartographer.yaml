id: character:cartographer
name: Elias Wren
concept: A coastal cartographer hired to chart the shoals, curious to a fault.
base:
  appearance: ink-stained cuffs, a tidy beard going salt-and-pepper
  manner: asks one question too many, means every kindness
overlays:
- when: [flag:elias-knows]
  details:
    manner: steady and watchful, a man who has chosen his post
- when: [flag:lie-between]
  details:
    manner: polite and distant, keeping his soundings to himself
arc:
  begins: a hired surveyor, loyal to accurate paper
  pivots:
  - beat: beat:offer
    becomes: has tied his own sailing to Maren's answer; the chart matters less
      than the keeper
  ends:
  - path: path:tell
    state: keeps her secret as carefully as a sounding
  - path: path:hide
    state: sails with a chart he half doubts and a friend he half knows
