id: character:keeper
name: Maren Voss
concept: Keeper of the Stilt Light, third of her family to hold the bargain.
base:
  appearance: weathered hands, oilskin coat, eyes the grey of harbor water
  manner: economical with words, exact with ropes and wicks
overlays:
- when: [flag:bound-to-light]
  details:
    manner: serene and immovable, like a post driven to bedrock
- when: [flag:sleeper-waking]
  details:
    manner: free-handed and haunted, forever glancing at the wake
arc:
  begins: keeper by inheritance; the bargain is habit, never yet a choice
  pivots:
  - beat: beat:returned-boat
    becomes: knows her mother sailed and the coast paid; the watch is now a question
      she must answer
  ends:
  - path: path:keep
    state: chooses the watch with open eyes; the light is hers, not her family's
  - path: path:break
    state: chooses herself and carries the coast's price to sea
