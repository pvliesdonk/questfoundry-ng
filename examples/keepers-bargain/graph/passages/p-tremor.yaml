id: passage:p-tremor
summary: >-
  The sea pulls back and the lamp gutters; the bar gives up her
  mother's boat and the old question settles; the bargain comes due as
  Elias offers Maren the dawn sailing.
entities: [character:keeper, character:cartographer, character:sleeper, location:lighthouse]
beats: [beat:tremor, beat:returned-boat, beat:inherited-watch, beat:offer]
