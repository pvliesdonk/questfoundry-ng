premise: >-
  A lighthouse keeper discovers that the light is the only thing keeping
  something in the sea asleep. When a visiting cartographer offers her a
  way off the rock, she must decide what she owes the coast, and what she
  owes herself.
genre: maritime folk horror
subgenre: quiet dread
tone: windswept, intimate, slow-burning
themes:
- duty against desire
- the cost of knowledge
- what the sea remembers
audience: adult
pov_hint: third person limited
scope: micro
