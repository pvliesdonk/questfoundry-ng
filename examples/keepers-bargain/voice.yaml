pov: third person limited (Maren)
tense: present
diction: spare, salt-worn, literary
rhythm: short declaratives against long tidal sentences that pull back out on the exhale
imagery: tide, weather, oil-light, worked rope and brass; dread lives in objects and
  intervals, never in similes; the sea is never personified above a murmur
dialogue: brief and unornamented; tags are said or nothing; what matters most goes unsaid
  and is carried by an action instead
banned:
- exclamation marks
- modern idiom
- naming the sleeper directly
- rhetorical questions
- adverb-stacked dialogue tags
notes: the sea and the lamp carry the dread; let silence and object detail do the work grief
  and horror would overstate
