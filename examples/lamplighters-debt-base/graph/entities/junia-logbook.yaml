id: object:junia-logbook
name: Junia's Logbook
concept: The mother's route-ledger ending in a half-finished map of something vast circling
  beneath the canals, its final ink still impossibly wet.
pronouns: it/its
base:
  appearance: swollen waterlogged leather, pages that smell of algae, a last map drawn in
    strokes that trail off mid-line
  detail: Its last line of ink stays perpetually wet — not smeared or spreading, but never
    setting, no matter the air or heat near it.
