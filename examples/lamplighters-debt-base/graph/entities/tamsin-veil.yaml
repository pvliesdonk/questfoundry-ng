id: character:tamsin-veil
name: Tamsin Veil
concept: Nineteen and newly sworn to her drowned mother's lamplighting route, she must choose
  whether to finish the map her mother left half-drawn.
pronouns: she/her
base:
  appearance: brine-chapped hands, her mother's oversized oilskin coat, hair the color of
    wet rope
  manner: quiet, watchful, prone to reading rooms before speaking
  ritual: On her route she counts the lamps of the ring every night without fail; losing the
    count unsettles her more than the dark.
