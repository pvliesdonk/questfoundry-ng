id: passage:p-close-the-book
summary: Tamsin shuts the logbook on its half-drawn map and sets the pen down unused, deciding
  the paid silence is a mercy. She re-seals the book as Junia sealed it, keeping the family's
  ignorance as a chosen tenderness rather than trade it for a horror.
