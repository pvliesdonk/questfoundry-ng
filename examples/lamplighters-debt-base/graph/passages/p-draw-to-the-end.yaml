id: passage:p-draw-to-the-end
summary: Tamsin sets the pen to the wet ink and follows Junia's line to its close, drawing
  the circling thing beneath the canals fully into shape. The completed map lays it bare —
  its size, its slow orbit, its patience — and at Lamp Forty-Two the knocking changes pitch,
  as if a two-hundred-year wait has finally received its answer.
