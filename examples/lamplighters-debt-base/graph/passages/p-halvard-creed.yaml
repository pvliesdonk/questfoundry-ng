id: passage:p-halvard-creed
summary: 'Sister Halvard finds Tamsin at the dark lamp and reveals the true creed: the flames
  are not defense but mercy owed to the drowned thing below, and the knock is a plea to be
  answered. At Lamp Forty-Two the knocking aligns with the map''s rhythm, and Tamsin feels
  her mother''s abandoned question press against her — to draw is to know, and to know is
  to never unknow.'
