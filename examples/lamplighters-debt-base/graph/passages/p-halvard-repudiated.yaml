id: passage:p-halvard-repudiated
summary: Sister Halvard's faith is repudiated to her face, the old keeper weeping for what
  Tamsin has loosed by leaving the knock unanswered. The unanswered thing is left to decide
  what comes; the wrongness the creed held in check stirs toward its own will, and the story
  closes on a ring no ritual guards anymore.
