id: passage:p-ledger-of-bribes-summoned
summary: With the map completed and the thing below now stirring in answer, Tamsin finds in
  Junia's logbook the record of Eldric Mowe's hereditary hush-money. Now she knows exactly
  what the payments bought silence about, and the knowledge makes the ledger monstrous.
