id: passage:p-ledger-of-bribes-unanswered
summary: With the map left half-drawn and the question refused, Tamsin finds in Junia's logbook
  the record of Eldric Mowe's hereditary hush-money — payments to keep the Veils silent. She
  still does not know what was being hidden, only that it was worth two centuries of coin.
