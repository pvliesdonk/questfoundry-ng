id: passage:p-map-half-drawn
summary: Tamsin studies the map's unfinished edge, where Junia's lines trail off mid-arc as
  if interrupted, and realizes the shape would close into something enormous. Nights pass
  and the ink stays wet; she understands the map is not dying but waiting, and that her mother
  meant someone to take up the pen.
