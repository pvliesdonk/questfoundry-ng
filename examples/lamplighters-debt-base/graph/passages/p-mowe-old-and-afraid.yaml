id: passage:p-mowe-old-and-afraid
summary: Tamsin sees Eldric Mowe old and afraid, and understands exposure would unravel not
  just his name but the fragile quiet holding the town together. Mowe pleads privately for
  her to let the lamps die as mercy and freedom from inherited dread, leaving her torn over
  the water between Halvard's devotion and her suspicion that the ritual is a cage dressed
  as kindness.
