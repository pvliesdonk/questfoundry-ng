id: passage:p-next-keeper-of-quiet
summary: Tamsin becomes the next keeper of a paid quiet she never chose, the chain unbroken
  and the cost of silence passed to her as it was to her mother. The ring burns greenish and
  afraid each night, Mowe's plan to end the debt collapses, and the town lives on in vigilant
  dread with its lamps still lit.
