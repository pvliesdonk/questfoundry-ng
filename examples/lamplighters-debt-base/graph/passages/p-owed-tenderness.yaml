id: passage:p-owed-tenderness
summary: The drowned thing receives its owed tenderness and quiets, the knocking softening
  into something almost grateful beneath the water. Tamsin becomes the next keeper of the
  creed, bound to two hundred years of listening, Junia's route revealed as an inherited act
  of mercy — the story closes on the tender cage she has chosen.
