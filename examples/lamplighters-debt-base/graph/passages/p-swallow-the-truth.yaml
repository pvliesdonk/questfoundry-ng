id: passage:p-swallow-the-truth
summary: Tamsin swallows the truth, preserving Mowe and the old arrangement for one more generation
  and keeping the paid silence her family always kept. Mowe's hereditary bribe stays buried,
  and the town's ignorance goes unbroken because it was never asked.
