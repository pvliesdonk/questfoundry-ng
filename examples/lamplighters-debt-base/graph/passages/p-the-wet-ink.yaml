id: passage:p-the-wet-ink
summary: Tamsin opens Junia's sealed logbook and finds a half-drawn map of something vast
  circling beneath the canals, its final ink still impossibly wet. Beneath the black water
  a rhythmic knocking grows insistent on Junia's old hours, and Oren Quist arrives from the
  mainland to wire the ring, cheerful and unafraid.
