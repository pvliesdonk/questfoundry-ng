id: passage:p-vote-called
summary: The council calls a vote to electrify the ring by morning, Eldric Mowe championing
  it as the end of the Veils' long-paid debt. Walking the guttering flames one last dusk,
  Tamsin feels how badly the town wants its fear gone; meanwhile the lamps begin to knock
  and almost speak to Oren, curdling his cheer into unease he carries to her.
