premise: 'Every dusk for two hundred years, the lamplighters of Veilsmeer have walked the
  canal ring in strict order, lighting forty-one lamps whose greenish flames never gutter
  — and every generation, the town council has quietly paid one family to never ask why lamp
  forty-two stays dark. Tamsin Veil, nineteen and newly sworn to her drowned mother''s route,
  finds her mother''s logbook sealed inside the dark lamp''s column: the last page is a half-finished
  map of something vast circling beneath the canals, and the ink is still wet. Tonight the
  council is voting to electrify the ring, the old flames are to be snuffed by morning, and
  something under the black water has begun, very softly, to knock.'
genre: Gothic fantasy
subgenre: folk-horror mystery with eldritch undertones
tone: hushed, brine-damp, and mournful; a slow-burning dread threaded with tenderness, where
  every ritual is both comfort and cage
themes:
- inherited duty against the right to ask why
- the mercy and cowardice of things left unspoken across generations
- preservation versus progress — do we snuff the old flames to be safe, or keep them lit and
  afraid?
- 'grief as a form of listening: what the dead leave half-finished for the living to complete'
audience: adult and older-teen readers who savor literary gothic dread, ambiguous folklore,
  and moral weight over gore
content_notes:
  include:
  - 'wet, tactile canal-town atmosphere: greenish flame, cold stone, the smell of algae and
    lamp-oil'
  - the intimate weight of a mother's unfinished logbook and a daughter's guessed handwriting
  - civic ritual rendered as both sacred and suspicious — council votes, paid silences, hereditary
    routes
  - 'creeping wrongness: the soft, patient knock beneath black water that never quite explains
    itself'
  - genuine moral cost to every choice, with no clean rescue and no cost-free triumph
  - grief that is quiet and unresolved rather than cathartic
  avoid:
  - gratuitous gore or body-horror spectacle
  - a fully explained monster or tidy exposition dump about what circles beneath
  - romance as primary engine or any sexual content
  - quippy modern irony that punctures the dread
  - a purely triumphant 'save the town' ending that erases the story's ambiguity
  - cruelty to children or animals shown on the page
pov_hint: close third or intimate second person anchored to Tamsin, present-tense-leaning
  to keep the dusk deadline pressing and the knock felt in the body
scope: short
