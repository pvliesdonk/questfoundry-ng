pov: third person limited (Tamsin), intimate and close enough to feel her pulse and the salt
  on her skin
tense: present
diction: spare, brine-damp, literary; liturgical cadence salted with plain dread; concrete
  nouns of water, tallow, and old iron over abstraction
rhythm: Mostly short, breath-held sentences broken by a single long tidal clause that pulls
  under; let silence sit at paragraph ends.
banned:
- no em-dash-and-ellipsis pile-ups for melodrama (choose one restrained mark per beat)
- no modern/technological idiom or slang that isn't the electrification's own plain vocabulary
- no gore-forward shock verbs (splatter, gush, mangle) — dread lives in the unspoken
- no rhetorical questions addressed to the reader
- no cozy comfort-words (snug, lovely, wonderful, amazing) that puncture the mournful hush
- no exclamation marks
notes: Every ritual should read as both tenderness and trap; leave the eldritch half-named,
  and let grief do the listening the prose won't spell out.
