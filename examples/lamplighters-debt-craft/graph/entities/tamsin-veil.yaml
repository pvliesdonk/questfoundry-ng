id: character:tamsin-veil
name: Tamsin Veil
concept: Nineteen and newly sworn to her drowned mother's lamplighting route, she must decide
  whether inherited duty is worth the truth it was built to hide.
pronouns: she/her
base:
  appearance: salt-chapped hands, her mother's too-large oilskin coat, hair kept short so
    it won't catch the flame
  manner: quiet, watchful, speaks to the dead through their tools as if they might answer
  tool: Carries her mother's wick-hook, worn to the shape of the dead woman's grip, and a
    striker no one else was permitted to touch.
  childhood-habit: As a sleepless child she would call her mother's name half up the stairs
    and wait for the boots on the boards and the green light bending under the door.
  learned-skill: Her mother taught her to pinch a wick out between wet fingers, quick and
    sure, without flinching from the heat.
