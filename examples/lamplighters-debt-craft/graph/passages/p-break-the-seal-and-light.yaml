id: passage:p-break-the-seal-and-light
summary: Tamsin breaks the two-century seal and kindles lamp forty-two, its green flame roaring
  up above the deepest bend as she binds herself to the route as its next keeper. The knock
  beneath the water falls silent for another generation; the ring endures and Veilsmeer remains
  tended, carried into another lifetime by a keeper who knows exactly what she imprisons and
  why.
