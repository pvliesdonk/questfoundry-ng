id: passage:p-keep-their-name-arm
summary: Sable stands beside Tamsin at the deepest bend, allied by her own choice, but neither
  looks at the withheld page between them. Her hand rests near the tools but does not reach;
  the thing they agreed never to say fills the silence like water rising slow, and Tamsin
  feels the mercy and the weight of it both, and lets it stay buried.
