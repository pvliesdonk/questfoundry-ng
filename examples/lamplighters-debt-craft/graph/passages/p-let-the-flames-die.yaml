id: passage:p-let-the-flames-die
summary: Tamsin sets down her mother's tools and lets the electrification proceed, refusing
  to light the forty-second, and by morning every green flame has guttered out. The two-hundred-year
  vigil ends in her hands and Corran's dream is complete, but below the deepest bend the black
  water no longer knocks softly — it moves, and whatever the lamps restrained is now loose
  in the dark.
