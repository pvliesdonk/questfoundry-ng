id: passage:p-pocket-the-ledger
summary: Tamsin folds the ledger away and says nothing to the town, taking Sable aside to
  tell her privately what her family was paid to protect. Spared public ruin, Sable sits with
  the forbidden answer and chooses of her own will to stand with Tamsin, her family's name
  intact, though the buried complicity remains a private, unsettled wound between them.
