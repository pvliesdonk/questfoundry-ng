id: passage:p-read-the-ledger-aloud
summary: Before the assembled town Tamsin reads the hush-money ledger aloud, naming the Ondrey
  family and Corran's forty years of signatures as the price of silence. Dragged into the
  light, Sable's family must answer publicly, the comfort that bought Sable's whole life laid
  bare, and Sable's reckoning is forced and raw before neighbors who now know what her family
  took to look away.
