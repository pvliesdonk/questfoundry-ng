id: passage:p-read-to-the-end
summary: Tamsin reads the wet page to its terrible conclusion and lets herself understand
  at last why lamp forty-two stays dark. Her mother's drowning becomes legible as a warning
  rather than an accident, a voice from under the water finally answered, and Tamsin carries
  this unbearable knowledge into every choice that follows.
