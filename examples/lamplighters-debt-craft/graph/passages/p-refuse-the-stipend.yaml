id: passage:p-refuse-the-stipend
summary: Tamsin refuses the money and the silence, forcing Corran to face forty years of his
  own signatures and the questions his money buried; stripped of the transaction he hid behind,
  he can no longer call his signing mercy. Poring over her mother's map, Tamsin studies how
  the forty-two flames encircle the thing below and asks whether the ring honors it or holds
  it.
