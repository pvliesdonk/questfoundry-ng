id: passage:p-sable-at-the-door
summary: Sable comes to Tamsin, torn between the comfort that raised her and the answer she
  was forbidden, not yet knowing her family are the paid silencers while Tamsin holds the
  proof. Tamsin understands that finishing the map means carrying its meaning forever, while
  burning it lets the knowing die with her mother; either way she cannot un-choose.
