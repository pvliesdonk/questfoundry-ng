id: passage:p-the-caged-knock
summary: 'The soft knock beneath lamp forty-two now carries the weight of a caged, hungering
  thing, recoloring the whole ring with fear rather than reverence. Tamsin holds the sealed
  lamp''s mechanism and understands this is the last choice: continue the vigil her mother
  died for, or let two hundred years end in her hands.'
