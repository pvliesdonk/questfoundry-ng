id: passage:p-the-circling-shape
summary: The map shows the vast shape circling always beneath the flames, never rising, never
  fed, and Tamsin cannot decide if two centuries of tending was reverence or restraint. She
  closes the logbook and descends to the town, where the council gathers for the vote, realizing
  the ledger spoken aloud could turn the room or ruin the one person who might stand with
  her.
