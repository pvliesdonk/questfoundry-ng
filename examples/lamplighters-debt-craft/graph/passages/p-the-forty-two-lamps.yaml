id: passage:p-the-forty-two-lamps
summary: Tamsin walks her drowned mother's route for the first time as sworn lamplighter,
  kindling forty-one green flames along the canals of Veilsmeer. The forty-second lamp above
  the deepest bend stays unlit, as it has for two hundred years.
