id: passage:p-the-lamps-are-bars-ashes
summary: 'Working only from the shape of the ring and the ashes of the map she burned, Tamsin
  decides the lamps are bars: something starving has been caged in the dark, and every act
  of tending was imprisonment. She cannot confirm it now, and the not-knowing makes the conviction
  heavier.'
