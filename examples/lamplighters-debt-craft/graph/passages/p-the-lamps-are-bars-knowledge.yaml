id: passage:p-the-lamps-are-bars-knowledge
summary: 'Knowing exactly what the map showed, Tamsin decides the lamps are bars: two centuries
  of flame have caged a starving thing she has now seen, and every act of tending was imprisonment.
  The certainty of what waits below sharpens the horror of the ring.'
