id: passage:p-the-ledger-surfaces
summary: 'Among her mother''s things Tamsin finds the hush-money ledger: forty years of Corran''s
  signatures paying the Ondrey family never to ask why lamp forty-two stays dark, meaning
  Sable''s whole life was bought by this silence. She breaks into her mother''s logbook and
  finds the last page, a wet-inked map of something vast circling beneath the canals, half-finished
  and unbearable to read fully.'
