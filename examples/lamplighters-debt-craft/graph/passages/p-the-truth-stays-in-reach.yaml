id: passage:p-the-truth-stays-in-reach
summary: With the coin refused, the truth beneath the water stays within Tamsin's reach; nothing
  has been sold or sealed away, and the questions remain hers. She can no longer see her mother's
  route as devotion, understanding every lamp she thought was care as a lock, and carries
  that knowledge into what comes.
