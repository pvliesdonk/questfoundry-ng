id: passage:p-the-water-knocks
summary: Beneath the dark lamp the black water begins to knock softly against the stone. The
  council votes to electrify the ring and snuff every green flame by morning, winning Corran's
  forty-year campaign; one by one the flames go out until only the forty-second still burns.
