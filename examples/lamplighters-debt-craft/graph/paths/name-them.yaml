consequences:
- id: consequence:family-exposed
  text: The hush-money ledger is laid before the town and Sable's family must answer for two
    centuries of paid silence.
- id: consequence:sable-allied-or-ruined
  text: Dragged into the light, Sable is forced to reckon publicly with the comfort that bought
    her whole life.
