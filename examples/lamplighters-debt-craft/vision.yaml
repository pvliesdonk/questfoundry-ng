premise: 'Every dusk for two hundred years, the lamplighters of Veilsmeer have walked the
  canal ring in strict order, lighting forty-one lamps whose greenish flames never gutter
  — and every generation, the town council has quietly paid one family to never ask why lamp
  forty-two stays dark. Tamsin Veil, nineteen and newly sworn to her drowned mother''s route,
  finds her mother''s logbook sealed inside the dark lamp''s column: the last page is a half-finished
  map of something vast circling beneath the canals, and the ink is still wet. Tonight the
  council is voting to electrify the ring, the old flames are to be snuffed by morning, and
  something under the black water has begun, very softly, to knock.'
genre: Cosmic horror
subgenre: gothic small-town dark fantasy
tone: damp, hushed, and slow-tightening; green-lit and reverent, with the intimacy of a girl
  talking to the dead through the things they left behind, curdling into dread that never
  quite raises its voice
themes:
- inherited duty against the right to know why
- the mercy and the cruelty of a secret kept across generations
- grief that refuses to stay buried under the water
- whether tending a thing is worship, imprisonment, or love
audience: Young adult (ages 14+), and adults who like literary horror
content_notes:
  include:
  - 'restraint over spectacle: dread built from silence, wet sound, and things half-seen beneath
    still water'
  - a nineteen-year-old protagonist with real, weighted agency over the ring's fate
  - the tactile grief of handling a dead parent's tools, handwriting, and route
  - 'town-scale moral pressure: the council, the paid family, neighbors who chose comfort
    over truth'
  - the ticking single-night structure — the vote, the snuffing by morning, the softening
    knock
  - endings that cost something and stay costed; no clean reset
  avoid:
  - gratuitous gore or graphic body horror; keep the flesh-dread implied and psychological
  - on-page cruelty to animals or children
  - romance beyond the tender or the implied — this is not the story's engine
  - jump-scare cheapness or monster over-exposure; the vast thing stays mostly unglimpsed
  - condescension, moralizing, or a tidy lesson about tradition
pov_hint: Second-person present, close on Tamsin — the reader walks her mother's route in
  her boots, the wet knock timed to the pulse; first-person past is an acceptable fallback
  if the prose stage finds the logbook framing stronger
scope: short
