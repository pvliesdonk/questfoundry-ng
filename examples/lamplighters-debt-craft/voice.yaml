pov: second person, close on Tamsin — the reader wears her boots on her mother's route
tense: present
diction: damp, reverent, plain-worded but exact; the hush of ritual done by hand, tenderness
  pressed against dread
rhythm: Short declaratives that hold their breath, loosened now and then by one long clause
  that fills like water before the next stop.
banned:
- em-dash pileups stacking three or more clauses in one sentence
- rhetorical questions to the reader ('Do you dare?')
- gore adjectives and shock-words (viscera, blood-soaked, screaming) that raise the voice
- modern/casual idiom (okay, kind of, no big deal, freaking)
- sentimentality tags that name the feeling (heartbreaking, the saddest, terrifying)
- exclamation points and all-caps emphasis
notes: Let objects carry the grief; the dead speak through what they left, never through the
  narrator explaining. Keep dread beneath the surface, never announced.
