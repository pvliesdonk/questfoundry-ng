question: Should Elara hand the sealed letter to Spymaster Vara who claims it can broker a
  trade for the frontier’s stability?
why_it_matters: Handing it over could secure a powerful ally but betrays the dying queen’s
  trust; keeping it may keep the peace proposal intact but lose a strategic advantage.
