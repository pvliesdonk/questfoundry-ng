prose_summary: Elara enters chamber; guards lower portcullis. She places letter on marble
  altar, feeling seal chill. Envoy reads letter aloud. Courtiers hear proposals to share river
  borders and fields. Elara notes peace direction. Council debates briefly, envoys exchange
  glances. Chief councilor declares accord sealed before sunrise, binding courts. Wax warms,
  reminding her oath; resolve steadied. Hall opens; parties move to terrace.
