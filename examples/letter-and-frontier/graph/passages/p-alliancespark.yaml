prose_summary: Elara enters the alcove, feels the crimson seal, gives the sealed parchment
  to Vara, who mentions shifting frontiers. A River Clan rider indicates a hidden throat in
  the wall. Elara senses the seal’s weight and must choose between the clan‑guarded concealed
  passage or the open dunes beyond the fort.
