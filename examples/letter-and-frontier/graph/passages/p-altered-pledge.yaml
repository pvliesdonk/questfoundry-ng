id: passage:p-altered-pledge
summary: Elara adjusts the treaty wording to stress mutual stewardship, and the rival lord
  reads the change, nods, and calls it a step toward lasting peace; she feels a pang of guilt
  as she realizes she has rewritten the queen’s words.
