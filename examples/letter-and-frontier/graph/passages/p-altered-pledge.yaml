prose_summary: Elara uses a quill to replace the treaty’s dominion clause with mutual stewardship,
  signs the scarlet wax seal bearing the queen’s emblem. Lord Varian reads the new line aloud,
  nods, and declares it a step toward lasting peace. Meros whispers that her counsel is a
  boon. The altered treaty now costs shared rulership.
