prose_summary: 'Elara watches stone markers fade, revealing two routes: Stonegate or open
  plain. She feels sealed wax on her cheek, confirming she hides the letter. The border camp’s
  green‑tabarded envoy stands by a wooden gate, scanning horizon. Soldiers shift spears on
  the wall. She decides to keep the letter hidden whichever path she chooses. Frontier weight
  presses her.'
