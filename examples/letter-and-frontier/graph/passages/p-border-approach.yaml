prose_summary: Elara rides the southern road to the border camp, dismounts, and places the
  scarlet‑sealed letter against her cloak. Vara Shadowmantle, envoy of the rival queen, emerges,
  gestures to a seat, and praises Elara’s speed. Elara sits, feels her lifelong oath weight,
  then tightens the seal, stands, and walks away from the fire, keeping the letter close,
  costing her life’s certainty.
