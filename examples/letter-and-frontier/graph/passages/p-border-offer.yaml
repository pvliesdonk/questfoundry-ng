id: passage:p-border-offer
summary: The envoy greets Elara at the border camp, offering her a place at the rival queen’s
  court and lauding her abilities; Elara confronts the sudden shift from lifelong courier
  to potential courtier, feeling the weight of abandoning the identity she’s known.
