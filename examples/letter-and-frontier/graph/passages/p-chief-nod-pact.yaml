prose_summary: Elara stands in stone corridor; chief nods, binding her to River Clan. She
  bows and offers debt, chief accepts. She carries queen’s red wax seal as oath reminder.
  Riders prepare to escort her across the plain. The promised favor may affect frontier peace.
  She tightens satchel, feels pact’s weight; spearmen assume positions.
