prose_summary: River Clan riders circle an ember and repeat their oath to protect the messenger.
  Elara touches the ember, feels heat, and notes a sealed missive under her breastplate. She
  recalls an uncovered map promising a mountain shortcut, decides not to use it, seals the
  map with a scarlet wax seal, and the clan reaffirms guarding her across the Silver Plain.
