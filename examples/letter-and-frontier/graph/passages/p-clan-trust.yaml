prose_summary: Elara meets River Clan chief, nods to seal a favor promise with the queen’s
  scarlet seal. She requests price; chief signals riders who clear a hidden archway under
  market arches, shielding her from bandits. A guard at rival court recognizes the clan emblem,
  opens doors. Elara enters council with sealed letter, gaining audience by the pact.
