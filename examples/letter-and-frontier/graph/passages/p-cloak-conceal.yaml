prose_summary: Elara wears a cloak that hides scarlet wax with a possible Malrik stamp. Vara
  Shadowmantle appears and asks for the sealed letter. Elara feels doubt about a promise to
  the River Clan and the queen’s oath. She adjusts her cloak, then slips the hidden sealed
  letter to Vara, binding her fate and risking clan loyalty.
