prose_summary: Elara moves deeper in the stone corridor; River Clan chief acknowledges her
  debt and summons the clan’s riders. An ember on a slab burns as the clan circles, repeats
  their pledge, and the chief signals the riders to escort her. She sits by the ember, tightens
  her satchel strap, hides the sealed missive, and incurs a future favor debt.
