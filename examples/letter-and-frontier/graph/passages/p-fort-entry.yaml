prose_summary: Malrik stands by the stone as the gate opens; a soldier greets courier Elara.
  He verifies the queen‑sealed parchment against his ledger, presses his iron stamp to confirm
  clearance, and hands the letter to the guard, who stores it and steps aside. Elara passes
  through the doorway toward the council chamber; the garrison watches.
