prose_summary: Elara enters council chamber; chief lifts iron stamp (crest) and asks purpose.
  Elara shows scarlet‑sealed parchment; councilwoman touches wax. Elara reveals one line “The
  dawn of shared fields”. Chief stamps parchment, declares fragment will be used to negotiate
  with rival court. Elara accepts leverage for safe passage south, guards record her, she
  leaves shaken.
