prose_summary: Elara moves through a narrow passage into a courtyard, reaches a massive iron
  gate to the main keep, and presents a sealed queen’s letter under her cloak; the guard lifts
  his visor and notes the parchment. She steadies her horse, feels pine resin scent, and steps
  toward the gate, the final barrier before the fort interior.
