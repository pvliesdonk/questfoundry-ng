prose_summary: Elara examines the queen’s sealed peace proposal on the stone slab, feels its
  chill and oath weight, surveys the southern road to Stonegate Fort with marching soldiers,
  a border camp, and ancient guide stones, notes the frontier’s weight, secures her satchel
  with the sealed letter, and steps forward toward the pending choices.
