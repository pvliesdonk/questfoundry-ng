id: passage:p-legacy-aftermath-bridge
summary: Elara gazes at the pristine peace proposal abandoned on cold stone as the sun slips
  behind the ridge, and she turns her thoughts to the southern road toward Stonegate Fort,
  where stone walls loom and soldiers patrol the path.
