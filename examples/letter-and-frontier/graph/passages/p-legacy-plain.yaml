prose_summary: Elara tightens satchel strap, feels scarlet wax seal on hidden letter. She
  steps east onto Silver Plain, drops parchment but returns it. She sees soldiers marching
  by stone wall toward Stonegate Fort, keeps letter sealed and the unread map remains sealed,
  and continues forward alone.
