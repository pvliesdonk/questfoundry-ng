id: passage:p-legacy-plain
summary: Elara rejects the temptation to read the secret map, sealing it away, and continues
  alone across the scarred passes of the Silver Plain, forced to navigate the treacherous
  terrain without its guidance. A cold wind lifts a stray strip of parchment, reminding her
  of the hidden letter she bears and the fragile hope it represents.
