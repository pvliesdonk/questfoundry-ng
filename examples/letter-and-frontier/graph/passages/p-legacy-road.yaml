prose_summary: Elara carries the queen's wax‑sealed peace proposal, scarlet seal hidden under
  her cloak. She surveys the stone‑lined southern road, sees weathered markers, a low stone
  wall leading to Stonegate Fort, soldiers marching with spears, and a border camp envoy in
  a dull green tabard. She steps toward the envoy, feeling the sealed oath pulse.
