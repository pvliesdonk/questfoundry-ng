prose_summary: Elara carries a satchel containing a hidden letter sealed with scarlet wax;
  the River Clan rider with spear awaits, offering concealed routes. Council murmurs beyond
  stone doors. The secret binds her trust with the rival court, recalls Vara's stare, risks
  the alliance, and upholds the queen’s oath. She can escort via hidden trails or walk alone
  to the rival hall.
