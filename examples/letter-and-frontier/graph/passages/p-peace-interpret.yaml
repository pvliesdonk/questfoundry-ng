prose_summary: Elara places sealed letter with untouched scarlet wax on stone altar. Lords
  gather, one reads ambiguous line, prompting debate. Elder warns against haste; nobles argue.
  Bell toll silences clamor. Lords pause, weighing decisions against the seal’s promise.
