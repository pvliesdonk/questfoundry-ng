prose_summary: Elara turns west onto Silver Plain, joins River Clan riders, ties rope; bandits
  appear, riders push them, steer her onto hidden track, storm drives them to stone cairn
  where they stand guard; she feels queen’s scarlet seal. After storm she reaches rival court’s
  stone chambers, passes armored wagons, enters great doors ahead of column.
