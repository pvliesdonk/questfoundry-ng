prose_summary: Elara steps from the marble archway onto courtyard flagstones; a western wind
  curls around the scarlet wax seal on her concealed letter, tightening it. The River Clan
  rider shifts his spear, reminding her oath. She tightens her cloak, feeling the cold pulse
  of the sealed letter and chooses to bear the secret's crushing weight to preserve the queen’s
  voice.
