prose_summary: She turns west onto the Silver Plain, feeling satchel weight. The sky darkens,
  a sandstorm approaches, and Stonegate Fort’s ajar gate and recording garrison appear. A
  River Clan rider in rust‑tipped spear joins, says they will keep the plain clear. She acknowledges,
  tightens cloak, urges horse forward; riders match her pace as storm looms, fort gate remains
  an uneasy option.
