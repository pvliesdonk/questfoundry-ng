prose_summary: She turns west onto the Silver Plain, meets a River Clan rider in a cloak who
  offers to ride with her. Her satchel holds biscuits and a water skin. A fire glows, sand
  swirls as a storm approaches. The road left leads to Stonegate Fort, whose gate will scrutinize
  travelers. She feels queen’s scarlet wax seal cold, recalling her oath.
