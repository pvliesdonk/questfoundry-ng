prose_summary: Elara turns her horse toward Stonegate Fort’s southern gate, decides on the
  southern road, hands the sealed letter to the forward guard, who verifies the seal and queen’s
  oath, opens the gate, and lets her enter the courtyard. A River Clan rider promises to watch
  the road, then the gate closes behind her as she readies her horse.
