id: passage:p-spymaster-deal
summary: The council, swayed by the queen’s direct appeal, hastens a trade agreement that
  promises to ease frontier tensions, raising hopes for peace while binding the kingdom to
  new obligations.
irrelevant_flags:
- flag:unmarked-letter
prose_summary: Elara stands on dais, holds warm queen seal wax. Council hears queen appeal,
  chancellor declares trade pact with River Clan, council sets terms. Scribe returns sealed
  letter, wax unbroken. Iron stamp glows on table. Treaty now exists between queen's oath
  and council pledge, costing political capital and future compliance.
