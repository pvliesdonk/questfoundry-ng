prose_summary: Elara presses her palm to the scarlet wax seal, lifts the queen’s oath parchment,
  and turns to the mute marshal whose gauntlet hand rests on his sword pommel. Vara emerges
  from the alcove, half‑masked, and warns that stability costs something. Elara can hide the
  letter deeper in her cloak or give it to Vara.
