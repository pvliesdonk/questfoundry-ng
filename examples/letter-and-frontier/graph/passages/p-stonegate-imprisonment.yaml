prose_summary: Elara walks down the endless stone corridor, heavy oak doors thudding shut
  behind her. She emerges to a courtyard blocked by a granite wall and iron gate, garrison
  eyes and ledger‑clerk recording her steps. She grasps a sealed parchment token, notes southern
  lords’ delayed reply, hears river and border drumbeat, tightens satchel strap, bearing the
  seal’s oath.
