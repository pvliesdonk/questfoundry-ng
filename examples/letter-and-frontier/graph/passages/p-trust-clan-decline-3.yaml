prose_summary: Elara enters council chamber, sees queen’s seal scarlet wax, Captain Malrik
  places iron stamp, reports messenger delay and rival court restlessness. Grey‑haired lord
  warns treaty loss if waiting; Lady Mirela warns envoys signal doubt. Council debates. Elara
  notices doorway to wind‑swept plain, feels River Clan’s shield absence, steps onto plain,
  abandoning stalled peace proposal.
