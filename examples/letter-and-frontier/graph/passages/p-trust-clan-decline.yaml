prose_summary: Elara declines River Clan protection, rides toward dunes alone, is ambushed
  by desert raiders who demand a letter, she fights with short blade, is wounded, leans on
  rock, notes scarlet seal, writes plea on emergency note, gives it to lingering rider, requests
  council to send alternate envoys, journey to rival court now delayed.
