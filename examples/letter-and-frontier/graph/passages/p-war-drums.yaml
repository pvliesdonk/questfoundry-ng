id: passage:p-war-drums
summary: She feels the distant war drums on the wind, reminding her that the clan’s trust
  carries far‑reaching stakes beyond any personal favor.
prose_summary: Elara stands on the Silver Plain ridge holding the queen’s seal wax; Malrik
  offers the iron stamp of Stonegate, saying it will mark her sanctioned. She tightens her
  satchel grip and refuses the stamp, recalling a River Clan chief’s loyalty promise that
  could spark battle. The war drums echo, the seal awaits her decision.
