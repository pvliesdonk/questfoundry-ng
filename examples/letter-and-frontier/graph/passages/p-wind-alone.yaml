prose_summary: Elara walks alone across the Silver Plain after the River Clan riders turn
  back. She carries a wax‑sealed letter pressed to her chest and a crisp secret map in her
  satchel. She feels the map, notes invisible ink trails, tightens her strap, and heads eastward
  as dusk falls and pine scent rises.
