prose_summary: Elara stands at the stone threshold of the council hall, feeling the queen's
  scarlet wax seal against her cloak and a hidden letter folded beneath it. She adjusts her
  satchel, inhales pine‑resin scent, feels fear, steadies her trembling hand, and notes a
  River Clan rider beside her, spear ready, scanning the torchlight.
