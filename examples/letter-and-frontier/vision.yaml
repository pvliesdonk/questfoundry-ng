premise: A young courier carries a dying border-queen's sealed peace letter across a divided
  frontier to the rival court that killed her brother. Two great roads cross the frontier,
  every hand along the way wants the letter altered, stolen, or quietly lost, and the courier
  cannot read what she carries — only decide, again and again, whom the peace is worth trusting
  to.
genre: Fantasy
subgenre: Political frontier fantasy
tone: Taut, intimate, slow‑burning tension threaded with fragile hope
themes:
- Duty against conscience
- Trust versus betrayal
- The price of peace versus the cost of war
- Identity of the messenger versus the role imposed
audience: Adults and mature YA (16+) who enjoy literary gamebooks and moral‑choice driven
  narratives
content_notes:
  include:
  - political intrigue
  - moral ambiguity
  - non‑violent conflict resolution
  - rich landscape description
  - subtle low‑magic
  avoid:
  - excessive gore
  - explicit sexual content
  - overpowered magical miracles
  - random luck‑based outcomes
pov_hint: third‑person limited centered on the courier’s perception and decision‑making
scope: short
words_target: 22000
