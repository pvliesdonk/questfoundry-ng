pov: third person limited (Elara Windrider)
tense: past
diction: spare, crisp, literary
rhythm: baseline plain sentences of varied length; occasional longer, rhythm‑stressed lines
  reserved for moments of heightened tension or hope
imagery: border‑wind, cold stone, muted dusk light, rust‑colored dust, distant river murmur,
  faint ember glow; sensory focus on touch, sound, and scent rather than elaborate similes
dialogue: brief, unornamented; tags are either 'said' or omitted
banned:
- exclamation marks
- second-person address
- participial phrase at sentence start
- dialogue tags other than 'said'
notes: Maintain tension through restrained prose; let the voice surface only at choice points
  or when the courier senses the frontier’s weight.
