id: passage:p-eat-the-fruit
summary: Mave bites through the spoil and swallows back the hour she surrendered; the office's
  immunity dissolves and grief floods in whole, the buried goodbye and its face returning
  as she weeps, mortal and unshielded again. Dawn finds the orchard standing unguarded, fruiting
  on for those who come after with no one exiled to protect them.
