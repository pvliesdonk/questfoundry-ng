id: passage:p-graft-the-rot
summary: Mave opens her forearm with the grafting knife and presses the rotting fruit into
  the wound, binding the spoil into her flesh; the rot withdraws from the roots and the soil
  and every donated hour are spared. She carries a grief that was never her own, the office's
  exile deepened, the keeper who holds what others cannot so the ground stays whole.
