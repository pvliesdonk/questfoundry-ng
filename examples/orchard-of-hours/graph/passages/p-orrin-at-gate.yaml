id: passage:p-orrin-at-gate
summary: Orrin arrives at first light with a sealed jar, begging Mave to take the hour of
  his child's coming death; she remembers surrendering her own grief and the years of numb
  exile since. Tracing the rot spreading from her trunk into her neighbors' roots, she leads
  Orrin toward the planting bed as he speaks of his daughter's small hands, and takes the
  warm, thrumming jar into her hands, knowing the ground she would trust it to is failing.
