id: passage:p-return-jar
summary: Mave presses the jar back into Orrin's arms and tells him plainly the orchard may
  no longer be safe to hold anyone's grief; he walks home through the gate, the hour of his
  daughter's death now his alone to bear. Alone among the souring rows, Mave hears her own
  confession echo — that her orchard is failing — the thing that unmakes the office she holds.
