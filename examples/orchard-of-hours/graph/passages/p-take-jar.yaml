id: passage:p-take-jar
summary: Mave kneels and buries Orrin's jar in ground she knows is spoiling, wagering his
  last mercy on the orchard's failing hold; he departs unburdened, never seeing the blackened
  trunk two rows over. Watching the fresh-turned soil settle, she weighs the true cost of
  the office against this one accepted grief.
