premise: A city sexton tends the Orchard of Hours, where every tree fruits with one hour someone
  chose to give away — an hour of grief skipped, a goodbye not said. When the tree grown from
  her own donated hour begins to rot, spoiling the orchard around it, she must decide whether
  to eat the fruit and take her hour back — losing the orchard its keeper's immunity — or
  graft the rot to herself and carry the hour's grief for whoever needs it spared next.
genre: Literary fantasy
subgenre: magical-realist fable / caretaker drama
tone: hushed, elegiac, tender but unsentimental; the slow-burning ache of tending something
  that outlives you, lit with grave-cold dawn light and the sweet-rot smell of overripe fruit
themes:
- 'the debt of stewardship: does caring for the collective grief of others give us the right
  to reclaim our own?'
- 'immunity as isolation: is the keeper''s protection from grief a gift or a quiet exile from
  being human?'
- 'possession versus grafting: whether the hours we give away are ever truly ours to take
  back, or whether love means carrying what others cannot'
- 'rot as inheritance: what we let spoil, and what we agree to bear so it does not spoil the
  ground for those who come after'
audience: Adult and mature YA readers who favor introspective, character-driven fantasy —
  readers of Le Guin's quieter work, Nghi Vo, and slow literary fabulism over action fantasy
content_notes:
  include:
  - 'sensory groundskeeping detail: pruning, grafting, the weight of a basket, soil under
    nails'
  - grief handled obliquely through metaphor and the physical labor of tending
  - the intimacy of small, irreversible choices; moral weight without villains
  - quiet ambiguity in outcomes — no clean victories, only chosen burdens
  - the texture of a single grief the sexton once gave away, revealed gradually
  avoid:
  - combat, chase sequences, or action-adventure pacing
  - cosmological info-dumps or hard-magic mechanics that explain the orchard away
  - a moralizing narrator that tells the reader which choice was correct
  - cruelty for shock, gore, or romanticized self-destruction
  - tidy redemption arcs or a rescue that erases the cost
pov_hint: Close second person, present tense — 'you' as the sexton, so the reader's hand is
  the one that must reach for the fruit or the grafting knife; intimate enough to feel the
  rot, restrained enough to keep her buried hour a slowly opening wound
