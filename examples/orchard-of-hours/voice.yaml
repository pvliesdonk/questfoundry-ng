pov: second person, close (you as Mave the sexton)
tense: present
diction: hushed, elegiac, tactile; spare literary fabulism with the plain nouns of orchard-work
  (rind, graft, loam, hour) set against grave-cold restraint
rhythm: Mostly measured, breath-length sentences that settle; let one short fragment land
  like a spade-stroke, then return to the long tending line.
banned:
- em-dash pile-ups and rhetorical-question sermons that name the theme aloud
- modern/clinical register (okay, fine, seconds, minutes, panic, trauma, closure)
- epic-fantasy diction (destiny, ancient evil, magic system, powers, prophecy)
- exclamation points and italics-for-emphasis
- sentimental comfort-words (heartwarming, precious little, bittersweet smile, single tear)
- action-thriller verbs (lunge, sprint, dash, slam) that break the slow burn
notes: Let grief be weighed and handled, never explained; keep the buried hour a wound that
  opens by degrees, and make the reader's hand do the reaching.
