id: dilemma:choose-recipient
question: Do you hand the jade figurine to Clara Vale, trusting her promise of payment, or
  give it to Victor Dario, hoping to bargain for safety?
why_it_matters: Delivering to Clara could secure the fee but possibly empower a manipulator;
  giving it to Victor may buy a truce but binds you to a mob that could erase you.
