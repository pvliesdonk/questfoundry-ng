prose_summary: Sam slips forged dossier into coat pocket, recalls promise to Lieutenant Ramos.
  Ledger points to dockside warehouse; he forces its rusted doors in rain. Inside he finds
  a dead police officer, badge reveals Ramos’s men, showing his evidence is false. Ramos calls,
  orders Sam to silence dock witness about the jade’s location, confirming debt’s price.
