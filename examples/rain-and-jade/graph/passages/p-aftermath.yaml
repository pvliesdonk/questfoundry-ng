prose_summary: Sam drags Clara through the side door into rain; thugs flee. A gaunt informant
  tells Sam Victor "Iron Fist" Dario plans to use the jade in a ritual to bind the docks.
  Sam learns Victor threatens severe retaliation, ending his anonymity. Sam now faces a risk
  of bloodshed or an unpayable debt, and vows to confront Victor.
