id: passage:p-setup
summary: Detective Sam "Rain" Marlowe meets silk‑clad Clara Vale, who hires him to retrieve
  a jade dragon said to hold a smuggled‑goods ledger, just as Victor’s thugs storm the warehouse
  and gunfire erupts.
