prose_summary: Sam meets Clara, who hands a sealed envelope and asks for the jade dragon figurine
  that hides a smuggler ledger. Victor’s thugs assault the warehouse; Sam shields Clara with
  a metal table, they flee to a backroom, Clara lifts the figurine, warns the payout will
  drown the city in gold, and demands Sam’s protection, costing him heavy responsibility.
