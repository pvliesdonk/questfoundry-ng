premise: 'A hard-boiled private eye in a rain-soaked port city takes a case from a woman who
  lies as easily as she breathes: recover a small jade figurine that three other people are
  already willing to kill for. As the bodies pile up and every client turns out to be playing
  him, the detective has to decide whether the statue — or the woman — is worth more than
  his own neck.'
genre: Crime
subgenre: Hard-boiled noir
tone: gritty, rain‑soaked, cynical, claustrophobic
themes:
- trust versus betrayal
- greed versus conscience
- identity versus manipulation
audience: Adult readers who savor classic noir and choice‑driven storytelling
content_notes:
  include:
  - sharp, clipped dialogue
  - murky moral dilemmas
  - urban decay and perpetual rain
  - high‑stakes violence that advances plot
  avoid:
  - supernatural or fantasy elements
  - sentimental, feel‑good resolutions
  - excessive gore without narrative purpose
  - comic relief that undercuts tension
pov_hint: Third‑person limited, tightly anchored to the detective's perspective and internal
  monologue
