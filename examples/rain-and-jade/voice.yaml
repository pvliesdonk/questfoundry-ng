pov: third person limited (Sam "Rain" Marlowe)
tense: past
diction: spare, salt-worn, literary
rhythm: 'Plain baseline: short, declarative sentences of varied length; occasional longer,
  rhythm‑laden sentences reserved for moments of tension or revelation.'
imagery: Rain‑slick streets, iron‑gray fog, cold steel, wet cobblestones, flickering neon,
  the metallic taste of seawater; dread lives in shadows and objects, never in florid simile.
dialogue: Brief, unornamented; dialogue tags limited to 'said' or omitted.
banned:
- exclamation marks
- second‑person address
- sentences opening with a participial phrase
- rhetorical questions to the reader
notes: Keep Sam’s internal monologue gritty and concise, letting the noir atmosphere surface
  only at pivotal moments.
