id: object:brother-statue
name: Elias's Effigy
concept: A fragile, vibrating statue of salt-glass that holds the final, echoing song of Maren's
  drowned brother.
base:
  appearance: A crystalline, tragically perfect likeness of a young man, glowing faintly with
    a cold, pale light.
  manner: Resonates continuously with a familiar, mournful baritone melody that tugs at the
    heart.
