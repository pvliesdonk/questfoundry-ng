id: character:choirmaster
name: The Choirmaster
concept: A towering conductor of fused salt-glass and rotting kelp who orchestrates the memories
  of the drowned.
base:
  appearance: Translucent and jagged, draped in sea-rime, with no eyes but an unsettling,
    harmonic presence.
  manner: Unfathomably ancient and entirely unsentimental; speaks in overlapping, oceanic
    chimes.
