premise: 'Every winter the drowned cathedral off the coast of Brinemouth rises with the spring
  tide for a single night, and its choir of salt-glass statues sings the memories of everyone
  the sea has taken. Maren, the lighthouse keeper''s apprentice, rows out to hear her drowned
  brother''s voice one last time — but the choirmaster, a figure of fused glass and kelp,
  offers her a trade: she may carry one voice back to shore, but only by leaving her own in
  its place. Tonight the cathedral is sinking for good, and whatever is still singing when
  the water closes over the spires stays beneath forever.'
genre: Nautical Gothic Fantasy
subgenre: Melancholic Fairy Tale
tone: elegiac, salt-bitten, urgent yet deeply mournful
themes:
- 'Memory against moving on: Is it better to preserve the past or let it sink?'
- 'Sacrifice against salvation: What is the true cost of holding onto the lost?'
- 'Agency against echo: The value of your own living voice compared to the chorus of the dead.'
audience: Players who seek bittersweet emotional narratives, oceanic folklore, and intimate
  character studies of grief.
content_notes:
  include:
  - sensory descriptions of brine, fragile glass, and freezing, rising water
  - choral and musical motifs blending with ocean sounds
  - the palpable tension of a ticking clock as the tide returns
  - solemn, uncanny interactions with the deep sea elements
  avoid:
  - gore, visceral body horror, or jump scares
  - combat sequences and action-hero tropes
  - cleanly happy endings that require no lasting sacrifice
  - modern or colloquial dialogue that breaks the mythic atmosphere
pov_hint: Second-person ('you') with an intense focus on auditory and tactile sensations—the
  cold damp, the ringing of glass, and the physical weight of breath.
