pov: second person
tense: present
diction: elegiac, salt-worn, lyrical, sensory-heavy
rhythm: Long, wave-like clauses that ebb into abrupt, solitary fragments mimicking jagged
  breaths or breaking glass.
banned:
- exclamation points (!)
- modern idioms and slang
- cognitive filter verbs ('you realize', 'you think', 'you notice')
- clinical or scientific terminology ('decibels', 'hypothermia', 'temperature')
notes: 'Anchor every emotional beat and narrative choice in tactile or auditory sensations:
  the taste of brine, the chill of wet glass, the physical strain of vocalizing.'
