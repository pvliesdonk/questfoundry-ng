id: object:wrens-parcel
name: The Parcel with Wren's Name
concept: A parcel the market has laid out addressed to Wren, containing a loss of their own
  they have never dared to claim.
pronouns: it/its
base:
  appearance: Brown paper gone soft with damp, string tied in the market's exact knot, Wren's
    name in handwriting they almost recognize
