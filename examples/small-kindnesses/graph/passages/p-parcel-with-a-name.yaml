id: passage:p-parcel-with-a-name
summary: 'On the claiming-table waits a parcel addressed in Wren''s own name, holding a loss
  of their own. The clerk lays out Emery''s contract: her debt is paid only in memories of
  being known, and when the rain stops she will be collected and erased. The rain is already
  thinning.'
