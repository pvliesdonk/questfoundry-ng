id: passage:p-rain-summons-market
summary: Rain unfurls the Night Market of Vellamere, where the stalls trade in unclaimed losses.
  Wren carries parcels of others' grief to Emery's stall, where she waves them in from the
  wet — but tonight her hands are packing crates, and she says the market has called in a
  debt.
