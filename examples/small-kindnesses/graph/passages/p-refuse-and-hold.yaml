id: passage:p-refuse-and-hold
summary: Wren refuses the trade and takes Emery's hands as the rain slows to its last drops,
  choosing to keep everything they loved of her rather than unmake it. The market gathers
  her in quiet, contractual erasure while Wren holds her through the final rain, every memory
  kept whole and aching, until she dissolves into the thinning wet.
