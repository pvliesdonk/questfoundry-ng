id: passage:p-trade-being-known
summary: Wren offers the market their own memories of being known, settling Emery's debt in
  the last of the rain. She remains in Vellamere, safe and unerased — but the market has taken
  the very memories that let her recognition of Wren exist, and she turns to thank a face
  she no longer fully knows.
