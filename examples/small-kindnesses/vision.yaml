premise: 'The night market of Vellamere appears only when it rains, selling things nobody
  knew they had lost: a grandmother''s laugh, the smell of a childhood kitchen, the courage
  you had at nine. Wren, a courier who has been quietly delivering the market''s parcels for
  years without ever buying, discovers tonight that the stall-keeper Emery — the one person
  who ever waves them through the rain like a friend — is packing to vanish: the market has
  called in Emery''s debt, and it collects in memories of being known. Wren has until the
  rain stops to decide what a friendship they never named is worth, and the market, which
  knows every unclaimed loss in the city, has already laid out a parcel with Wren''s own name
  on it.'
genre: Literary fantasy
subgenre: urban magical-realism / slipstream romance
tone: rain-soaked, aching, intimate; slow-burning tenderness laced with quiet dread; a bittersweet
  hush like the last hour before something ends
themes:
- the cost of being known against the safety of staying invisible
- what a friendship you never dared to name is worth once it's about to disappear
- whether love is holding on or letting go without asking for return
- the tension between the losses we hoard and the ones we're brave enough to claim
audience: Adult and older-teen readers who love character-driven fantasy and stories about
  memory, connection, and quiet longing; fans of authors like Erin Morgenstern and Catherynne
  Valente, comfortable with ambiguity and melancholy.
content_notes:
  include:
  - sensory rain and market atmosphere rendered as memory made tangible (smells, sounds, half-forgotten
    laughter)
  - the slow, unspoken intimacy between Wren and Emery, where every small gesture carries
    unstated weight
  - the moral texture of debt, sacrifice, and self-erasure treated with gravity, not spectacle
  - meaningful choices where the courier's habit of never buying, never claiming, is the real
    wound to overcome
  - a bittersweet resolution that lets tenderness and loss coexist rather than resolving cleanly
  avoid:
  - gore, graphic violence, or horror-movie shock tactics
  - villain monologues or a market that is simply 'evil'; its cruelty should be indifferent,
    contractual, systemic
  - tidy fairy-tale wish-fulfillment where sacrifice costs nothing
  - explicit sexual content; keep intimacy in the register of yearning and near-touch
  - cynicism or ironic detachment that undercuts the emotional sincerity
pov_hint: Second person, present tense, close on Wren — 'you' as the courier who has spent
  years handing others their losses without ever opening a parcel of your own; let the rain
  and the market press in immediate and tactile.
