pov: second person, close on Wren ('you'), interior but restrained — thoughts surface as sensation
  and hesitation rather than analysis
tense: present
diction: spare, rain-soft, literary; concrete and tactile with occasional lyric reach, never
  ornate for its own sake
rhythm: Favor short and mid-length sentences that pool and pause; let one long clause-linked
  breath arrive only when feeling crests, then cut back to quiet.
banned:
- em-dash dumps and stacked dashes for dramatic interruption (max one em-dash per passage)
- rhetorical questions aimed at the reader ('Don't you?', 'What would you do?')
- modern-casual idiom and slang ('okay', 'kind of', 'a whole thing', 'vibe')
- exclamation points
- cliche weather-as-mood phrasing ('rain like tears', 'heavens opened', 'storm of emotion')
- explicit emotion-naming that tells the feeling outright ('you feel sad', 'she was heartbroken')
notes: Let loss be a physical object and memory a currency; keep dread quiet and love unspoken,
  trusting gesture, weight, and the thinning rain to carry what Wren cannot say.
