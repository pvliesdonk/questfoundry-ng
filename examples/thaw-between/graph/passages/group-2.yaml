prose_summary: Wind hammers lighthouse stones; cold seeps basalt walls, supplies of pork and
  oil shrink. Coastguard patrol arrives; officer demands iron‑bound logbook for rations, Elara
  places the tome on stone slab, sealing pact. Marek enters lantern room, lens hums, warns
  barrier may shatter if lifted. Marek argues safety depends on lens, proposes moving it,
  urging Elara to trust light.
