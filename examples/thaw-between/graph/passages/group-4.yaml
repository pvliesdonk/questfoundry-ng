prose_summary: Elara holds the weather‑worn logbook. Marek presents the rune‑etched sea‑glass
  lens, promising it will protect the coast if carried across the shoals. Elara accepts the
  Coastguard’s promise, lifts the logbook toward Marek, committing to deliver the lens and
  bear the duty’s weight.
