prose_summary: Elara places the Great Lens on lantern crown, swears to guard the sea, and
  the Lens binds the tide, creating a barrier that presses the sea’s weight onto her shoulders.
  At dawn she lowers the Lens into its cradle as the cartographer arrives, Marek vanishes,
  and suspicion lingers. Night, cartographer walks toward the cliff and Elara bears heavy
  oath.
