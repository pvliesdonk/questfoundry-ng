prose_summary: Elara climbs the cliff to the tower, the lantern dies and the great lens stops
  shining. The tower moans as an ancient ocean terror attacks Marek's brig, splintering hull
  and flooding deck. Elara grasps the rail as the tower collapses, the lens sinks, her oath
  breaks, and the sea claims the tower.
