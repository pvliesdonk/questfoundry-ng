premise: A lighthouse keeper discovers that the light is the only thing keeping something
  in the sea asleep. When a visiting cartographer offers her a way off the rock, she must
  decide what she owes the coast, and what she owes herself.
genre: Dark Fantasy
subgenre: Maritime Gothic
tone: brooding, contemplative, claustrophobic
themes:
- duty versus self‑preservation
- the weight of legacy
- the unknown versus the known
audience: Adult readers (18+) who appreciate literary, morally ambiguous interactive fiction
content_notes:
  include:
  - psychological tension
  - maritime atmosphere
  - moral ambiguity
  - slow‑burn character introspection
  avoid:
  - explicit gore
  - overly romantic subplots
  - comic relief
pov_hint: close third‑person limited, anchored on the lighthouse keeper
