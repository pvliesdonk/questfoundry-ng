pov: third person limited (Elara Wren)
tense: past
diction: salt-worn, literary, bleak
rhythm: Alternate a terse, punchy sentence with a longer, layered one, each ending on a heavy
  verb.
imagery: tide, oil-light, stone, wind-howl; dread lives in objects, never in similes
dialogue: brief, unornamented; tags are only 'said' or omitted.
banned:
- exclamation marks
- questions addressed to the reader
- sentences opening with a participial phrase
- dialogue tags other than 'said'
notes: Keep the lighthouse's oppressive stone and sea as a constant pressure on every decision.
