id: object:sovereign-wind-key
name: The Sovereign Wind-Key
concept: A man-length key with teeth like constellations, the only instrument that can couple
  or uncouple the great mainspring and set the city’s beat.
base:
  craft: Forged with sung harmonics; turns only for the bound.
  locus: Chained above the Clocktower’s belly, links draped like a rosary.
  function: Governs torque transfer, release, and the city’s governed tempo.
  legend: Said to remember the hand that first wound it.
  weight: Heavier than its metal, as if it carries a season.
  scent: Smells faintly of cold iron and rosemary oil from old polish.
  tactile: Its grip is worn concave by generations of thumbs, a smooth crescent that finds
    the palm without looking.
  chain_chime: Its suspension chain always gives a single, low chime when first hauled from
    rest.
  thumb-crescent: A shallow worn crescent fits your thumb from generations of turns.
  balance: Carries a slight butt‑heavy pull from its leaded pommel, so torque wants to settle
    down into the wrist.
  wear: Its grip bears a shallow crescent worn smooth by generations of thumbs finding purchase
    before the turn.
  worn-crescent-notch: A shallow crescent is worn smooth along the handle where thumbs have
    pressed for generations.
