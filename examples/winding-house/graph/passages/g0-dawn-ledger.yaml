id: passage:g0-dawn-ledger
summary: At dawn the city thrums to the Great Mainspring while the Halt scowls beyond the
  walls; you feel the torque in your bones as you carry Mira Threadgill’s debt chit from the
  greying shop. In the Clocktower’s heart beside Master Calder, the Sovereign Wind-Key gleams
  and a ledger addendum waits under his seal—kin may gift apprenticed years to steady a failing
  life.
