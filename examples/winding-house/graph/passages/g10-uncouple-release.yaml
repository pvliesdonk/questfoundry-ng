id: passage:g10-uncouple-release
summary: You wrench the Key backward and uncouple the hungry gear; stored years exhale through
  the tower as the city’s tempo slackens and the long-sealed gates rasp toward open. Down
  in the streets color and memory surge—Mira lifts her head—as you steady yourself against
  the gentler world.
