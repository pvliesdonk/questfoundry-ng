id: passage:g13-locked-ending
summary: Patrols cinch the tower and dissent is logged as threat; you are praised while sanctioned
  drifts grey Mira’s edges and Rook is turned from the gates. Households lose hours in quiet
  waves as you oversee merciless precision, the ledger growing heavier until night lays silk-slow
  on a strong, forgetful city and you keep the beat beside Calder.
