id: passage:g3-alley-pressure
summary: In a wind-bit alley, Rook Ashfell names the siphon as theft and hints at another
  way to face the Halt; moments later Calder’s praise in the workshop tightens into a warning
  about duty and waste. The offer in the ledger turns from mercy to complicity in your hands.
