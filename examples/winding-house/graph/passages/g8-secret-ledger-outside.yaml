id: passage:g8-secret-ledger-outside
summary: Behind a false panel you find Calder’s private ledger of years siphoned from homes
  to over-wind the mainspring—Mira’s name circled in neat ink—just as Rook pulls you to a
  hatch and the outer stillness presses close. He speaks of a slower rhythm the city might
  learn without stealing, and the choice in you hardens.
