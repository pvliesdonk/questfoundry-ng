premise: An apprentice clockmaker in a city that winds itself discovers the great mainspring
  is failing, and that her master has been stealing years from the citizens' clocks to keep
  it turning. A stranger from outside the walls offers her the truth about what the city is
  winding against.
genre: Fantasy
subgenre: Clockpunk, gaslamp mystery
tone: intimate, melancholic, quietly tense, wonder-struck, morally thorny
themes:
- Loyalty to a mentor versus moral awakening
- Preservation of the system versus justice for the stolen
- Belonging inside the walls versus the perilous truth outside
- 'Time as debt: private hoarding versus the common good'
audience: Upper YA and adult readers who enjoy character-driven clockwork fantasy and ethical
  dilemmas
content_notes:
  include:
  - 'Tactile clockwork worldbuilding: gears, mainsprings, wind-keys, wound streets'
  - 'Small, pressure-cooker cast: apprentice, master, outsider, and one city entity (friend,
    automaton, or warden)'
  - Investigative beats and quiet setpieces (clocktower belly, winding plaza, wall aperture)
  - Moral choices with cascading consequences rather than combat
  - The city as organism-machine; ambient stakes of time depletion (missing hours, greyed
    memories)
  - A personal subplot about a single citizen losing years that grounds the cost
  - Low-violence, high-peril sequences (mechanical hazards, timed decisions, sabotage)
  - 'Symbols and motifs: ticks, keys, winding songs, borrowed-time chits'
  - A reveal about what the city winds against that reframes the master's theft
  - Endings that balance bittersweet sacrifice with hard-won agency
  avoid:
  - Graphic violence, gore, or torture
  - Sexual content or romance as primary driver
  - Time-travel paradox mechanics; treat time as resource, not timeline-hopping
  - Steampunk firearms or large battles; no gun fetishization
  - Modern slang or flippant quips that break tone
  - Nihilistic 'nothing matters' outcomes; preserve meaning even in loss
  - Needlessly dense lore dumps or encyclopedic exposition
  - Stereotyping of disability or aging; do not equate lost time with lesser worth
pov_hint: Second-person limited from the apprentice’s perspective, present tense; tactile,
  sensory prose with mechanical metaphors
