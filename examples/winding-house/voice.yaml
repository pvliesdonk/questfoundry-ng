pov: second person limited (you, the apprentice clockwright)
tense: present
diction: spare, tactile, clockwork-lyrical, melancholic
rhythm: Alternate short, gear-snap sentences with longer, hinge-and-release coils; end paragraphs
  on image or pressure.
banned:
- Exclamation points and ellipses
- Modern slang or casual fillers (okay, kinda, sorta, vibe, dude)
- Pop-culture references or contemporary tech metaphors
- Quippy snark or winking asides that break the seal of tone
- Mixed-register purple similes that glitter or gush
- Meta-narration about choices, stats, or being in a game
notes: Anchor emotion in touch, weight, and timekeeping imagery; let ethics surface through
  concrete costs and debts, not speeches, and keep wonder hushed, near the skin.
